<!-- SNA UNIFIED v3 FULL - Copy from here -->
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA Unified</title><style>body{margin:0;font-family:Arial;background:#f4f6f3}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}nav{display:flex;position:sticky;top:0}nav button{flex:1;padding:12px;border:0;background:#ddd;font-weight:700}nav button.active{background:#0a5c36;color:#fff}.wrap{padding:12px;max-width:1000px;margin:auto}.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 3px #0002}input,select{width:100%;padding:8px;margin:4px 0;border:1px solid #bbb;border-radius:4px}button.primary{background:#0a5c36;color:#fff;border:0;padding:9px 14px;border-radius:5px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #999;padding:4px;text-align:center}th{background:#eee}.hide{display:none}@media print{nav,header,.no-print{display:none}}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><div>CBT + Results Unified System v3</div></header>
<nav><button class="active" onclick="sh('cbt',this)">CBT</button><button onclick="sh('sc',this)">Scores</button><button onclick="sh('rp',this)">Report</button><button onclick="sh('tr',this)">Teacher</button></nav>
<div class="wrap">
<div id="cbt" class="card"><h3>Secondary CBT (20 marks)</h3><input id="nm" placeholder="Student Name"><select id="cl"><option>SS1</option><option>SS2</option><option>JSS2</option><option>Basic 5</option><option>Nur 2</option></select><select id="sb"><option>MATHEMATICS</option><option>ENGLISH</option></select><button class="primary" onclick="document.getElementById('cb').classList.remove('hide')">Start Demo</button><div id="cb" class="hide"><p>Q1: 12÷3=? <label><input type=radio name=q>4</label></p><button class="primary" onclick="saveCBT()">Submit (16/20)</button></div></div>

<div id="sc" class="card hide"><h3>Scores & Broadsheet</h3>Segment <select id="sg" onchange="ld()"><option>Secondary</option><option>Primary</option><option>Preschool</option><option>Creche</option></select> Class <select id="sc2" onchange="rd()"></select> Term <select><option>1st</option><option selected>2nd</option><option>3rd</option></select><div style="overflow:auto"><table id="tb"><thead></thead><tbody></tbody></table></div><button class="primary" onclick="sv()">Save</button> <button onclick="csv()">Export CSV</button></div>

<div id="rp" class="card hide"><div class="no-print"><select id="rs"></select> <select><option>2nd Term</option><option>3rd Term</option></select> <button class="primary" onclick="rp()">Generate</button> <button onclick="print()">Print</button></div><div id="rout" style="margin-top:12px"></div></div>

<div id="tr" class="card hide"><h3>Teacher</h3><input type="password" placeholder="admin123" id="pw"><button onclick="if(pw.value==='admin123')alert('Logged in - 6 students ready')">Login</button></div>
</div>
<script>
let DB=JSON.parse(localStorage.sna||'{}');if(!DB.s)DB.s=[{n:"Akinlade Aishat",c:"SS1",g:"Secondary"},{n:"Olanrewaju Sheriffdeen",c:"SS1",g:"Secondary"},{n:"Bilal Fatai",c:"SS2",g:"Secondary"},{n:"Abdlateef Abdulmuqsit",c:"JSS2",g:"Secondary"},{n:"Bashiru Mariam",c:"Basic 5",g:"Primary"},{n:"Oladoja Umar",c:"Nur 2",g:"Preschool"}];if(!DB.m)DB.m={};
function sh(id,b){document.querySelectorAll('.card').forEach((x,i)=>x.parentNode.id?0:x.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function ld(){const s=sg.value;sc2.innerHTML=[...new Set(DB.s.filter(x=>x.g===s).map(x=>x.c))].map(x=>`<option>${x}</option>`).join('');rd()}
function rd(){const s=sg.value;const c=sc2.value;const sec=s==='Secondary';tb.querySelector('thead').innerHTML=sec?'<tr><th>Name</th><th>CA40</th><th>CBT20</th><th>Paper40</th><th>Total</th><th>Grade</th>':'<tr><th>Name</th><th>CA40</th><th>Exam60</th><th>Total</th><th>Grade</th>';tb.querySelector('tbody').innerHTML='';DB.s.filter(x=>x.c===c).forEach(st=>{const m=DB.m[st.n]||{ca:28,cb:14,pa:34};const t=sec?m.ca+m.cb+m.pa:m.ca+m.pa;const g=t>=90?'A*':t>=80?'A1':t>=75?'B2':t>=70?'B3':t>=65?'C4':t>=60?'C5':t>=55?'C6':t>=50?'D':t>=40?'E':'F';tb.querySelector('tbody').innerHTML+=`<tr><td>${st.n}</td><td><input value="${m.ca}" style="width:60px"></td>${sec?`<td><input value="${m.cb}" style="width:60px"></td>`:''}<td><input value="${m.pa}" style="width:60px"></td><td>${t}</td><td>${g}</td></tr>`})}
function sv(){[...tb.querySelectorAll('tbody tr')].forEach((r,i)=>{const n=r.children[0].textContent;const inp=[...r.querySelectorAll('input')];DB.m[n]={ca:+inp[0].value,cb:+(inp[1]?.value||0),pa:+(inp[2]?.value||inp[1].value)} });localStorage.sna=JSON.stringify(DB);alert('Saved')}
function csv(){let o='Name,CA,CBT,Paper,Total\n';[...tb.querySelectorAll('tbody tr')].forEach(r=>{o+=r.children[0].textContent+','+[...r.querySelectorAll('input')].map(i=>i.value).join(',')+','+r.children[4].textContent+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([o]));a.download='broadsheet.csv';a.click()}
function saveCBT(){const n=nm.value||'Demo';DB.m[n]={ca:0,cb:16,pa:0};localStorage.sna=JSON.stringify(DB);alert('CBT 16/20 saved for '+n)}
function rp(){const n=rs.value;const st=DB.s.find(x=>x.n===n);const m=DB.m[n]||{ca:28,cb:14,pa:34};const tot=m.ca+m.cb+m.pa;const g=tot>=90?'A*':tot>=80?'A1':tot>=75?'B2':tot>=70?'B3':'C4';rout.innerHTML=`<div style="border:2px solid #000;padding:12px;background:#fff"><h2 style="color:red;text-align:center;margin:0">SEALED NECTAR ACADEMY</h2><p style="text-align:center;font-size:12px">5 Gemtade Akanji St, Ota, Ogun State<br><b>REPORT SHEET</b></p><table border=1 width=100%><tr><td>NAME</td><td colspan=3><b>${n}</b></td><td>CLASS</td><td>${st.c}</td></tr><tr><td>SESSION</td><td>2025/2026</td><td>TERM</td><td>2nd</td><td>SEGMENT</td><td>${st.g}</td></tr></table><br><table border=1 width=100%><tr><th>SUBJECT</th><th>CA</th><th>EXAM</th><th>TOTAL</th><th>GRADE</th></tr><tr><td>MATHEMATICS</td><td>${m.ca}</td><td>${m.cb+m.pa}</td><td>${tot}</td><td>${g}</td></tr><tr><td>ENGLISH</td><td>30</td><td>45</td><td>75</td><td>B2</td></tr></table><p>Teacher's Comment: Good effort<br><br>Director of Studies: Keep it up!<br><i>[DOS Signature]</i></p><p style="font-size:10px;text-align:center">IF YOU ARE PIOUS ALLAH SHALL CROWN YOUR EFFORTS</p></div>`}
rs.innerHTML=DB.s.map(x=>`<option>${x.n}</option>`).join('');ld();
</script></body></html>
