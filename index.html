<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA v4.0</title><style>body{margin:0;font-family:Arial;background:#f4f6f3}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}nav{display:flex;position:sticky;top:0;z-index:9}nav button{flex:1;padding:12px;border:0;background:#ddd;font-weight:700}nav button.active{background:#0a5c36;color:#fff}.wrap{padding:12px;max-width:1100px;margin:auto}.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 3px #0002}input,select{width:100%;padding:7px;margin:3px 0;border:1px solid #bbb;border-radius:4px}button.primary{background:#0a5c36;color:#fff;border:0;padding:8px 14px;border-radius:5px;cursor:pointer}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #777;padding:4px;text-align:center}th{background:#eee}.hide{display:none}@media print{nav,header,.no-print{display:none}body{background:#fff}}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><div>Unified CBT & Results System v4.0</div></header>
<nav><button onclick="sh('sc',this)" class="active">Scores</button><button onclick="sh('rp',this)">Report</button><button onclick="sh('cb',this)">CBT</button></nav>
<div class="wrap">
<div id="sc" class="card"><h3>Enter CA (40) + Exam (60)</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div>Segment<select id="seg" onchange="loadClasses()"><option>Secondary</option><option>Primary</option><option>Preschool</option></select></div><div>Class<select id="cls"></select></div><div>Term<select id="trm"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select></div><div>Subject<select id="sub"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option><option>PHYSICS</option><option>CHEMISTRY</option><option>BIOLOGY</option><option>ECONOMICS</option><option>GOVERNMENT</option><option>LITERATURE-IN-ENGLISH</option><option>ACCOUNTING</option><option>COMMERCE</option><option>CIVIC EDUCATION</option><option>YORUBA</option><option>IRS</option><option>ARABIC</option><option>AGRIC SCIENCE</option><option>COMPUTER STUDIES</option><option>FURTHER MATHS</option><option>BST</option><option>CCA</option><option>PVS</option><option>HOME ECONOMICS</option></select></div></div><button class="primary" onclick="loadScores()">Load Students</button><div style="overflow:auto;margin-top:8px"><table id="tbl"><thead><tr><th>Name</th><th>CA</th><th>Exam</th><th>Total</th></tr></thead><tbody></tbody></table></div><button class="primary" onclick="saveScores()">Save All</button> <span id="msg" style="color:green"></span></div>

<div id="rp" class="card hide"><div class="no-print"><h3>Generate Report</h3>Student <select id="stu"></select> Term <select id="rtm"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select> <button class="primary" onclick="makeReport()">Generate</button> <button onclick="window.print()">Print PDF</button></div><div id="rout"></div></div>

<div id="cb" class="card hide"><h3>Secondary CBT (20 questions)</h3>Name <input id="cnm" placeholder="Student name"> Class <select id="ccl"><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option></select> Subject <select id="csb"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option><option>PHYSICS</option><option>CHEMISTRY</option><option>BIOLOGY</option></select> <button class="primary" onclick="startCBT()">Start (Demo 16/20)</button><p id="cres"></p></div>
</div>
<script>
const DB=JSON.parse(localStorage.snaV4||'{"students":[{"n":"Akinlade Aishat","c":"SS1","g":"Secondary"},{"n":"Olanrewaju Sheriffdeen","c":"SS1","g":"Secondary"},{"n":"Bilal Fatai","c":"SS2","g":"Secondary"},{"n":"Abdlateef Abdulmuqsit","c":"JSS2","g":"Secondary"},{"n":"Sample JSS1","c":"JSS1","g":"Secondary"},{"n":"Sample JSS3","c":"JSS3","g":"Secondary"},{"n":"Sample SS3","c":"SS3","g":"Secondary"},{"n":"Bashiru Mariam","c":"Basic 5","g":"Primary"},{"n":"Sample Basic 1","c":"Basic 1","g":"Primary"},{"n":"Oladoja Umar","c":"Nur 2","g":"Preschool"}],"scores":{}}');
function save(){localStorage.snaV4=JSON.stringify(DB)}
function sh(id,b){document.querySelectorAll('.wrap>div').forEach(d=>d.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function loadClasses(){const g=seg.value;cls.innerHTML=[...new Set(DB.students.filter(s=>s.g===g).map(s=>s.c))].map(c=>`<option>${c}</option>`).join('')}
function loadScores(){const c=cls.value,t=trm.value,s=sub.value;const tb=tbl.querySelector('tbody');tb.innerHTML='';DB.students.filter(st=>st.c===c).forEach(st=>{const rec=((DB.scores[st.n]||{})[t]||{})[s]||{ca:0,ex:0};tb.innerHTML+=`<tr data-n="${st.n}"><td>${st.n}</td><td><input type="number" min="0" max="40" value="${rec.ca}" style="width:60px"></td><td><input type="number" min="0" max="60" value="${rec.ex}" style="width:60px"></td><td class="tot">${rec.ca+rec.ex}</td></tr>`});tb.querySelectorAll('input').forEach(i=>i.oninput=e=>{const r=e.target.closest('tr');r.querySelector('.tot').textContent=(+r.children[1].firstChild.value)+(+r.children[2].firstChild.value)})}
function saveScores(){const t=trm.value,s=sub.value;document.querySelectorAll('#tbl tbody tr').forEach(r=>{const n=r.dataset.n,ca=+r.children[1].firstChild.value,ex=+r.children[2].firstChild.value;DB.scores[n]=DB.scores[n]||{};DB.scores[n][t]=DB.scores[n][t]||{};DB.scores[n][t][s]={ca,ex}});save();msg.textContent='Saved!';setTimeout(()=>msg.textContent='',2000)}
function grade(t){return t>=90?'A*':t>=80?'A1':t>=75?'B2':t>=70?'B3':t>=65?'C4':t>=60?'C5':t>=55?'C6':t>=50?'D':t>=40?'E':'F'}
function makeReport(){const n=stu.value,t=rtm.value,st=DB.students.find(x=>x.n===n);const subs=[...document.getElementById('sub').options].map(o=>o.value).slice(0,12);let rows='',sum=0;subs.forEach(sb=>{const g1=((DB.scores[n]||{})['1st Term']||{})[sb]||{ca:0,ex:0};const g2=((DB.scores[n]||{})['2nd Term']||{})[sb]||{ca:0,ex:0};const g3=((DB.scores[n]||{})['3rd Term']||{})[sb]||{ca:0,ex:0};const v1=g1.ca+g1.ex,v2=g2.ca+g2.ex,v3=g3.ca+g3.ex;const use=t==='1st Term'?v1:t==='2nd Term'?v2:v3;const avg=Math.round((v1+v2+v3)/3);const show=t==='3rd Term'?avg:use;if(show>0){rows+=`<tr><td style="text-align:left">${sb}</td><td>${t!=='3rd Term'?'':v1}</td><td>${t!=='3rd Term'?'':v2}</td><td>${t!=='3rd Term'?'':v3}</td><td>${show}</td><td>${grade(show)}</td></tr>`;sum+=show}});const avg=Math.round(sum/(rows.split('<tr>').length-1||1));rout.innerHTML=`<div style="border:3px double #000;padding:15px;font-family:Arial;background:#fff"><div style="text-align:center;border-bottom:2px solid #000;padding-bottom:8px"><h1 style="color:#c00;margin:0;font-size:24px">SEALED NECTAR ACADEMY</h1><div>5, Gemtade Akanji Street, Ota, Ogun State</div><div style="font-weight:bold;margin-top:4px">2025/2026 ACADEMIC SESSION - ${t.toUpperCase()} REPORT</div></div><table width="100%" style="margin:10px 0;font-size:13px"><tr><td width="15%">NAME:</td><td width="35%"><b>${n}</b></td><td width="15%">CLASS:</td><td width="35%"><b>${st.c}</b></td></tr><tr><td>SESSION AVG:</td><td><b>${avg}% (${grade(avg)})</b></td><td>POSITION:</td><td>____</td></tr></table><table width="100%" border="1" cellspacing="0" cellpadding="4" style="font-size:12px"><tr style="background:#eee"><th>SUBJECT</th>${t==='3rd Term'?'<th>1ST</th><th>2ND</th><th>3RD</th>':''}<th>SCORE</th><th>GRADE</th></tr>${rows}</table><div style="margin-top:20px;display:flex;justify-content:space-between"><div>Class Teacher: _____________</div><div>Director of Studies:<br><span style="font-family:cursive">A. Raji</span></div></div><div style="text-align:center;margin-top:15px;font-size:11px;border-top:1px solid #000;padding-top:5px">IF YOU ARE PIOUS ALLAH SHALL CROWN YOUR EFFORTS - NEXT TERM BEGINS: ___</div></div>`}
function startCBT(){const n=cnm.value||'Student',s=csb.value,t='2nd Term';DB.scores[n]=DB.scores[n]||{};DB.scores[n][t]=DB.scores[n][t]||{};DB.scores[n][t][s]={ca:0,ex:16};save();cres.textContent=`Saved 16/20 for ${n} - ${s}. Go to Scores to see it as Exam score.`}
stu.innerHTML=DB.students.map(s=>`<option>${s.n}</option>`).join('');loadClasses();
</script></body></html>
