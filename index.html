<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA Unified v3</title><style>:root{--g:#0a5c36}body{font-family:Arial;margin:0;background:#f5f5f5}header{background:var(--g);color:#fff;padding:10px;text-align:center}nav{display:flex}nav button{flex:1;padding:10px;border:none;background:#ddd}nav button.active{background:var(--g);color:#fff}.card{background:#fff;margin:10px;padding:12px;border-radius:6px}input,select{width:100%;padding:8px;margin:4px 0}table{width:100%;border-collapse:collapse}th,td{border:1px solid #999;padding:4px;font-size:13px}.hide{display:none}@media print{nav,header,.no-print{display:none}}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><small>CBT + Results Unified System</small></header>
<nav><button class="active" onclick="show('cbt',this)">CBT</button><button onclick="show('scores',this)">Scores</button><button onclick="show('report',this)">Report</button></nav>

<div id="cbt" class="card"><h3>Secondary CBT (20 marks)</h3><input id="n" placeholder="Name"><select id="c"><option>SS1</option><option>SS2</option><option>JSS2</option><option>Basic 5</option></select><button onclick="alert('CBT Demo: Score 16/20 saved')">Start Demo CBT</button></div>

<div id="scores" class="card hide"><h3>Enter Scores</h3><select id="seg" onchange="load()"><option>Secondary</option><option>Primary</option><option>Preschool</option><option>Creche</option></select><select id="cls"></select><table id="tbl"><thead><tr><th>Name</th><th>CA(40)</th><th>CBT(20)</th><th>Paper(40)</th><th>Total</th><th>Grade</th></tr></thead><tbody></tbody></table><button onclick="save()">Save & Export CSV</button></div>

<div id="report" class="card hide"><h3>Report Card</h3><select id="stu"></select><button onclick="gen()">Generate</button><div id="out"></div></div>

<script>
const students=[{n:"Akinlade Aishat",c:"SS1",s:"Secondary"},{n:"Olanrewaju Sheriffdeen",c:"SS1",s:"Secondary"},{n:"Bilal Fatai",c:"SS2",s:"Secondary"},{n:"Abdlateef Abdulmuqsit",c:"JSS2",s:"Secondary"},{n:"Bashiru Mariam",c:"Basic 5",s:"Primary"},{n:"Oladoja Umar",c:"Nur 2",s:"Preschool"}];
const sig="data:image/jpeg;base64,/9j/4AAQ..."; // your DOS signature embedded
function show(id,btn){document.querySelectorAll('.card').forEach(x=>x.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function load(){const seg=document.getElementById('seg').value;const cls=document.getElementById('cls');cls.innerHTML=[...new Set(students.filter(x=>x.s===seg).map(x=>x.c))].map(c=>`<option>${c}</option>`).join('');const tb=document.querySelector('#tbl tbody');tb.innerHTML='';students.filter(x=>x.c===cls.value).forEach(s=>{tb.innerHTML+=`<tr><td>${s.n}</td><td><input value="28" type="number" max="40"></td><td><input value="16" type="number" max="20"></td><td><input value="35" type="number" max="40"></td><td>79</td><td>B2</td></tr>`})}
function save(){let csv="Name,CA,CBT,Paper,Total,Grade\n";document.querySelectorAll('#tbl tbody tr').forEach(r=>{csv+= [...r.children].map(td=>td.textContent||td.querySelector('input')?.value).join(',')+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv]));a.download='SNA-Broadsheet.csv';a.click()}
function gen(){const n=document.getElementById('stu').value;document.getElementById('out').innerHTML=`<div style="border:2px solid #000;padding:10px"><h2 style="color:red;text-align:center">SEALED NECTAR ACADEMY<br><span style="font-size:14px">REPORT SHEET</span></h2><p><b>NAME:</b> ${n}</p><table border="1" width="100%"><tr><th>SUBJECT</th><th>CA</th><th>EXAM</th><th>TOTAL</th><th>GRADE</th></tr><tr><td>MATHS</td><td>28</td><td>51</td><td>79</td><td>B2</td></tr></table><p>TEACHER'S COMMENT: Good</p><p>DIRECTOR OF STUDIES: <img src="${sig}" height="30"> Keep it up</p><p style="text-align:center;font-size:10px">IF YOU ARE PIUS ALLAH SHALL CROWN YOUR EFFORTS...</p></div>`}
document.getElementById('stu').innerHTML=students.map(s=>`<option>${s.n}</option>`).join('');load();
</script></body></html>
