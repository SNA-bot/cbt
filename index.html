<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNA CBT v4.8 – English + Results</title>
<style>body{margin:0;font-family:system-ui;background:#f0f2f5}header{background:#0a5c36;color:#fff;padding:16px;text-align:center}h1{margin:0;font-size:20px}.wrap{max-width:850px;margin:auto;padding:12px}.card{background:#fff;padding:14px;margin:10px 0;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1)}label{display:block;font-weight:600;margin:8px 0 4px;font-size:14px}select,input,textarea,button{width:100%;padding:11px;font-size:16px;border:1px solid #bbb;border-radius:8px;box-sizing:border-box}button{background:#0a5c36;color:#fff;font-weight:700;border:0;margin-top:8px;cursor:pointer}button.sec{background:#eee;color:#333}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.ok{color:green;font-weight:700}.bad{color:#b00;font-weight:700}.hide{display:none}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border:1px solid #ddd;padding:6px;font-size:13px}</style>
</head><body><header><h1>SEALED NECTAR ACADEMY</h1><div>v4.8 – English Preloaded + Results Export</div></header>
<div class="wrap">
<div class="card" id="loginCard"><h3>1. Admin Login</h3><input id="pw" type="password" placeholder="Password (SNA2026)"><button onclick="login()">Login</button></div>

<div id="admin" class="card hide"><h3>2. Admin Panel</h3>
<div class="row"><div><label>Segment</label><select id="seg"></select></div><div><label>Class</label><select id="cls"></select></div></div>
<div class="row"><div><label>Term</label><select id="trm"></select></div><div><label>Subject</label><select id="sub"></select></div></div>
<div id="where" style="margin:8px 0;font-size:13px;color:#555"></div>
<button class="sec" onclick="load()">Load Bank</button> <button class="sec" onclick="downloadResults()">Download All Results (CSV)</button>
<div id="status" style="margin-top:6px"></div><hr>
<label>Question</label><textarea id="q" rows="2"></textarea>
<div class="row"><div><label>A</label><input id="a"></div><div><label>B</label><input id="b"></div></div>
<div class="row"><div><label>C</label><input id="c"></div><div><label>D</label><input id="d"></div></div>
<label>Correct</label><select id="co"><option>A</option><option>B</option><option>C</option><option>D</option></select>
<button onclick="add()">Add & Save</button>
<div id="list" style="margin-top:10px;font-size:14px"></div>
<div id="resultsTable"></div>
</div>

<div class="card"><h3>3. Student CBT</h3>
<input id="name" placeholder="Student full name">
<div class="row"><div><label>Segment</label><select id="s2"></select></div><div><label>Class</label><select id="c2"></select></div>
<div class="row"><div><label>Term</label><select id="t2"></select></div><div><label>Subject</label><select id="b2"></select></div></div>
<button onclick="start()">Start Exam</button><div id="exam" style="margin-top:10px"></div></div>
</div>
<script>
const data={Nursery:["KG1","KG2"],Primary:["PRY1","PRY2","PRY3","PRY4","PRY5","PRY6"],Secondary:["JSS1","JSS2","JSS3","SS1","SS2","SS3"]};
const terms=["1st Term","2nd Term","3rd Term"];
const subs=["PHYSICS","CHEMISTRY","BIOLOGY","ENGLISH LANGUAGE","MATHEMATICS","BASIC SCIENCE","AGRICULTURAL SCIENCE","CIVIC EDUCATION","COMPUTER STUDIES","ECONOMICS"];
const fill=(id,a)=>document.getElementById(id).innerHTML=a.map(x=>`<option>${x}</option>`).join('');
fill('seg',Object.keys(data));fill('s2',Object.keys(data));fill('trm',terms);fill('t2',terms);fill('sub',subs);fill('b2',subs);
const upd=()=>{fill('cls',data[seg.value]);fill('c2',data[s2.value]);where.textContent='Saving to: '+key()}; seg.onchange=upd; s2.onchange=()=>fill('c2',data[s2.value]); upd();
const key=()=>`qb_${seg.value}_${cls.value}_${trm.value}_${sub.value}`; const key2=()=>`qb_${s2.value}_${c2.value}_${t2.value}_${b2.value}`;
function login(){if(pw.value==='SNA2026'){admin.classList.remove('hide');loginCard.classList.add('hide');showResults()}else alert('Wrong')}
function load(){const d=JSON.parse(localStorage.getItem(key())||"[]");status.innerHTML=`<span class="ok">${d.length} questions</span>`;list.innerHTML=d.map((x,i)=>`${i+1}. ${x.q}`).join('<br>')}
function add(){if(!q.value.trim())return alert('Enter Q');let d=JSON.parse(localStorage.getItem(key())||"[]");d.push({q:q.value,a:a.value,b:b.value,c:c.value,d:d.value,correct:co.value});localStorage.setItem(key(),JSON.stringify(d));q.value=a.value=b.value=c.value=d.value='';load()}

// PRELOAD
const preload={...}; // (Physics, Chemistry, Biology from v4.7 - keeping same to save space)
// For brevity in this message, keep previous 90 questions - they remain in your browser. Adding English only:
const english=[
{q:"The word 'man' in 'He was assigned to man the gate' means",a:"adult male",b:"to operate or take charge of",c:"husband",d:"soldier",correct:"B"},
{q:"Which of the following is the correct spelling?",a:"Accomodation",b:"Accommodation",c:"Acommodation",d:"Accomodation",correct:"B"},
{q:"In summary writing, answers must be written in",a:"phrases",b:"complete sentences",c:"bullet points",d:"single words",correct:"B"},
{q:"An adjunct that answers 'How often?' belongs to",a:"Manner",b:"Frequency",c:"Time",d:"Place",correct:"B"},
{q:"A narrative essay must be written mainly in the",a:"present tense",b:"future tense",c:"past tense",d:"perfect tense",correct:"C"},
{q:"The word 'target' in advertising refers to",a:"the product",b:"the group of people the advert is aimed at",c:"the price",d:"the company",correct:"B"},
{q:"Which is an example of a noun clause?",a:"The boy who came late",b:"What he said surprised everyone",c:"Running fast",d:"In the morning",correct:"B"},
{q:"'It is a man's world' is best classified as a",a:"Narrative essay",b:"Expository essay",c:"Argumentative essay",d:"Descriptive essay",correct:"C"},
{q:"The sound /i:/ in 'heat' contrasts with /ɪ/ in",a:"hit",b:"hat",c:"hut",d:"hot",correct:"A"},
{q:"An antonym of 'fertile' is",a:"barren",b:"fruitful",c:"rich",d:"productive",correct:"A"},
{q:"Skimming is mainly used to",a:"find specific details",b:"get the general idea",c:"memorize facts",d:"answer comprehension",correct:"B"},
{q:"A formal letter must contain",a:"slang and contractions",b:"writer’s address, date, salutation and subscription",c:"personal greetings",d:"emotional expressions",correct:"B"},
{q:"Nominalization involves turning words into",a:"verbs",b:"nouns",c:"adjectives",d:"adverbs",correct:"B"},
{q:"The comparative form of 'expensive' is",a:"expensiver",b:"more expensive",c:"most expensive",d:"expensivest",correct:"B"},
{q:"'The man who stole the money has been caught', the clause 'who stole the money' is",a:"Noun clause",b:"Adjectival clause",c:"Adverbial clause",d:"Main clause",correct:"B"},
{q:"Words associated with government include",a:"ballot box, constituency, democracy",b:"headline, editor, by-line",c:"mortar, scaffold, glazier",d:"rhyme, diphthong, stress",correct:"A"},
{q:"Dropping final 'e' before adding 'ing' applies to",a:"hope – hoping",b:"notice – noticeable",c:"argue – argument",d:"change – changeable",correct:"A"},
{q:"The intonation pattern for a polite request is usually",a:"falling",b:"rising",c:"level",d:"falling-rising",correct:"B"},
{q:"A synonym of 'renowned' is",a:"famous",b:"unknown",c:"obscure",d:"hidden",correct:"A"},
{q:"In summary writing, extraneous materials should be",a:"included",b:"avoided",c:"emphasized",d:"repeated",correct:"B"},
{q:"The word 'press' in journalism refers to",a:"newspapers and magazines",b:"ironing clothes",c:"pushing",d:"printing machine only",correct:"A"},
{q:"'He runs as if he were being chased' contains an adverbial clause of",a:"Time",b:"Manner",c:"Reason",d:"Condition",correct:"B"},
{q:"Which is a diphthong?",a:"/eɪ/",b:"/ɪ/",c:"/ʃ/",d:"/s/",correct:"A"},
{q:"The theme of a passage is the",a:"title",b:"main idea",c:"supporting details",d:"conclusion",correct:"B"},
{q:"A semi-formal letter is written to",a:"a close friend",b:"an official with some familiarity",c:"a family member",d:"a stranger",correct:"B"},
{q:"The plural of 'secretary-general' is",a:"secretary-generals",b:"secretaries-general",c:"secretarys-general",d:"secretaries-generals",correct:"B"},
{q:"Scanning is used to",a:"get general idea",b:"locate specific information",c:"read for pleasure",d:"summarize",correct:"B"},
{q:"An example of a word with stress on second syllable",a:"BA-sic",b:"be-GIN",c:"CRE-dit",d:"HAP-py",correct:"B"},
{q:"Opposite of 'cowardice' is",a:"bravery",b:"fear",c:"timidity",d:"weakness",correct:"A"},
{q:"In argumentative essay, the writer should",a:"only present one side",b:"present points with supporting reasons",c:"narrate a story",d:"describe events",correct:"B"}
];
if(!localStorage.getItem("qb_Secondary_SS1_3rd Term_ENGLISH LANGUAGE"))localStorage.setItem("qb_Secondary_SS1_3rd Term_ENGLISH LANGUAGE",JSON.stringify(english));

let qs=[],ans=[],pos=0,currentMeta={};
function start(){qs=JSON.parse(localStorage.getItem(key2())||"[]");if(!qs.length){exam.innerHTML='<span class=bad>No questions</span>';return}ans=Array(qs.length).fill(null);pos=0;currentMeta={name:name.value||'Student',subject:b2.value,class:c2.value,term:t2.value,date:new Date().toLocaleString()};show()}
function show(){const x=qs[pos];exam.innerHTML=`<b>Q${pos+1}/${qs.length}</b><p>${x.q}</p>`+['a','b','c','d'].map(k=>`<label style="display:block;margin:6px 0"><input type="radio" name="r" value="${k.toUpperCase()}" ${ans[pos]===k.toUpperCase()?'checked':''} onchange="ans[${pos}]=this.value"> ${k.toUpperCase()}. ${x[k]}</label>`).join('')+`<div class="row"><button class="sec" onclick="if(pos>0){pos--;show()}">Prev</button><button onclick="if(pos<qs.length-1){pos++;show()}else submit()">${pos<qs.length-1?'Next':'Submit'}</button></div>`}
function submit(){let c=0;qs.forEach((x,i)=>{if(ans[i]===x.correct)c++});const score=Math.round(c/qs.length*60);const result={...currentMeta,score:`${c}/${qs.length}`,mark:score};let all=JSON.parse(localStorage.getItem('sna_results')||"[]");all.push(result);localStorage.setItem('sna_results',JSON.stringify(all));exam.innerHTML=`<span class=ok>Done!</span><p>${result.name}: ${c}/${qs.length} = <b>${score}/60</b></p>`;showResults()}
function showResults(){const all=JSON.parse(localStorage.getItem('sna_results')||"[]");if(!all.length){resultsTable.innerHTML='';return}resultsTable.innerHTML='<h4>Saved Results</h4><table><tr><th>Name</th><th>Class</th><th>Subject</th><th>Score</th><th>Mark/60</th><th>Date</th></tr>'+all.map(r=>`<tr><td>${r.name}</td><td>${r.class}</td><td>${r.subject}</td><td>${r.score}</td><td>${r.mark}</td><td>${r.date}</td></tr>`).join('')+'</table>'}
function downloadResults(){const all=JSON.parse(localStorage.getItem('sna_results')||"[]");if(!all.length)return alert('No results yet');const csv=['Name,Class,Subject,Term,Score,Mark,Date',...all.map(r=>`"${r.name}",${r.class},"${r.subject}","${r.term}",${r.score},${r.mark},"${r.date}"`)].join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='SNA_Results.csv';a.click()}
load();
</script></body></html>
