<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNA v4.4</title>
<style>
:root{--g:#0a5c36}*{box-sizing:border-box;font-family:system-ui}body{margin:0;background:#f5f7f6}
header{background:var(--g);color:#fff;padding:16px;text-align:center}
nav{display:flex}nav button{flex:1;padding:12px;border:0;background:#eee;font-weight:600}
nav button.active{background:#fff;border-bottom:3px solid var(--g);color:var(--g)}
.card{background:#fff;margin:12px;padding:14px;border-radius:10px}
input,select,textarea,button{width:100%;padding:10px;margin:5px 0;border:1px solid #999;border-radius:6px;font-size:1rem;background:#fff}
button.primary{background:var(--g);color:#fff;border:0;font-weight:700}
.hidden{display:none}label{font-weight:600;margin-top:8px;display:block;font-size:.9rem}
</style>
</head>
<body>
<header><h2>SEALED NECTAR ACADEMY</h2><p>v4.4 – Class Fix</p></header>
<nav>
<button onclick="tab('s')" id="b1" class="active">Scores</button>
<button onclick="tab('c')" id="b3">CBT</button>
<button onclick="tab('a')" id="b4">Admin</button>
</nav>

<div id="a" class="card">
<h3>Admin – Question Bank (Login: SNA2026)</h3>
<input id="pw" type="password" placeholder="Enter password"><button class="primary" onclick="if(document.getElementById('pw').value==='SNA2026'){document.getElementById('panel').classList.remove('hidden')}else{alert('Wrong')}">Login</button>

<div id="panel" class="hidden">
<label>Segment</label>
<select id="seg" onchange="updateClass()"></select>
<label>Class</label>
<select id="cls"></select>
<label>Term</label>
<select id="trm"></select>
<label>Subject</label>
<select id="sub"></select>
<button onclick="loadBank()">Load Bank</button>

<hr>
<label>Question</label><textarea id="q" rows="3"></textarea>
<label>A</label><input id="a1"><label>B</label><input id="a2"><label>C</label><input id="a3"><label>D</label><input id="a4">
<label>Correct</label><select id="cor"><option>A</option><option>B</option><option>C</option><option>D</option></select>
<button class="primary" onclick="addQ()">Add Question</button>
<div id="list"></div>
<button class="primary" onclick="saveBank()">Save Bank</button>
</div>
</div>

<div id="c" class="card hidden"><h3>CBT</h3>
<input id="name" placeholder="Student name">
<select id="cseg" onchange="document.getElementById('ccls').innerHTML=classes[this.value].map(x=>`<option>${x}</option>`).join('')"></select>
<select id="ccls"></select>
<select id="ctrm"></select>
<select id="csub"></select>
<button class="primary" onclick="startExam()">Start</button>
<div id="exam"></div>
</div>

<div id="s" class="card hidden"><h3>Scores (auto-filled from CBT)</h3><p>Check after students submit.</p></div>

<script>
const classes={Nursery:["KG1","KG2"],Primary:["PRY1","PRY2","PRY3","PRY4","PRY5","PRY6"],Secondary:["JSS1","JSS2","JSS3","SS1","SS2","SS3"]};
const terms=["1st Term","2nd Term","3rd Term"];
const subjects=["MATHEMATICS","ENGLISH LANGUAGE","BASIC SCIENCE","PHYSICS","CHEMISTRY","BIOLOGY","BASIC TECHNOLOGY","AGRICULTURAL SCIENCE","CIVIC EDUCATION","COMPUTER STUDIES","ECONOMICS","GOVERNMENT","LITERATURE IN ENGLISH","COMMERCE","ACCOUNTING"];

function init(){
["seg","cseg"].forEach(id=>{document.getElementById(id).innerHTML=Object.keys(classes).map(k=>`<option>${k}</option>`).join('')});
["trm","ctrm"].forEach(id=>document.getElementById(id).innerHTML=terms.map(t=>`<option>${t}</option>`).join(''));
["sub","csub"].forEach(id=>document.getElementById(id).innerHTML=subjects.map(s=>`<option>${s}</option>`).join(''));
updateClass();
document.getElementById('ccls').innerHTML=classes["Nursery"].map(x=>`<option>${x}</option>`).join('');
}
function updateClass(){
const seg=document.getElementById('seg').value;
document.getElementById('cls').innerHTML=classes[seg].map(c=>`<option>${c}</option>`).join('');
}
function tab(n){["s","c","a"].forEach(id=>document.getElementById(id).classList.toggle("hidden",id!==n));}

let bank=[];
function loadBank(){const k=`qb_${seg.value}_${cls.value}_${trm.value}_${sub.value}`;bank=JSON.parse(localStorage.getItem(k)||"[]");list.innerHTML=bank.map((q,i)=>`${i+1}. ${q.q} [${q.correct}]<hr>`).join('');}
function addQ(){bank.push({q:q.value,a:a1.value,b:a2.value,c:a3.value,d:a4.value,correct:cor.value});q.value=a1.value=a2.value=a3.value=a4.value="";loadBank();}
function saveBank(){const k=`qb_${seg.value}_${cls.value}_${trm.value}_${sub.value}`;localStorage.setItem(k,JSON.stringify(bank));alert("Saved "+bank.length+" questions for "+sub.value+" "+cls.value);}

function startExam(){const k=`qb_${cseg.value}_${ccls.value}_${ctrm.value}_${csub.value}`;const qs=JSON.parse(localStorage.getItem(k)||"[]");if(!qs.length)return alert("No questions yet");exam.innerHTML=`<p>Loaded ${qs.length} questions. Exam ready.</p>`;}

window.onload=init;
</script>
</body>
</html>
