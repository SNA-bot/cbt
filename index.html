d exposing soil to erosion","c":"Improving water retention","d":"Increasing soil acidity","correct":"B"},{"q":"Cocoa black pod disease is caused by","a":"Virus","b":"Fungus","c":"Bacterium","d":"Nematode","correct":"B"},{"q":"Trypanosomiasis in cattle is transmitted by","a":"Housefly","b":"Tsetse fly","c":"Mosquito","d":"Tick","correct":"B"},{"q":"One effect of food shortage on population is","a":"Increased natality","b":"Emigration and competition","c":"Stable population growth","d":"Reduced mortality","correct":"B"},{"q":"Which of the following is a method of improving crop production?","a":"Monocropping only","b":"Use of resistant varieties and fertilizers","c":"Deforestation","d":"Overgrazing","correct":"B"}];

xture of","a":"CO and H₂","b":"CO and N₂","c":"H₂ and CH₄","d":"CO₂ and N₂","correct":"B"},{"q":"Hydrogen trioxocarbonate(IV) salts are also called","a":"Normal carbonates","b":"Acid carbonates","c":"Basic carbonates","d":"Complex carbonates","correct":"B"},{"q":"The main hydrocarbon in natural gas is","a":"Ethene","b":"Methane","c":"Propane","d":"Butane","correct":"B"},{"q":"The process of breaking down large hydrocarbon molecules into smaller ones is called","a":"Reforming","b":"Cracking","c":"Fractional distillation","d":"Polymerization","correct":"B"},{"q":"Octane number is a measure of","a":"Volatility of petrol","b":"Knocking tendency of fuel","c":"Density of fuel","d":"Sulphur content","correct":"B"},{"q":"A heavy chemical is one that is produced","a":"In small quantities","b":"In large quantities","c":"Only in the laboratory","d":"For personal use only","correct":"B"},{"q":"The raw material for the Solvay process is","a":"NaCl","b":"CaCO₃","c":"NH₃","d":"All of the above","correct":"D"},{"q":"Which of the following is used as a drying agent?","a":"Na₂CO₃","b":"Conc. H₂SO₄","c":"NaOH","d":"CaCO₃","correct":"B"},{"q":"Lime water turns milky with CO₂ due to the formation of","a":"Ca(HCO₃)₂","b":"CaCO₃","c":"CaO","d":"CaSO₄","correct":"B"},{"q":"The hardest allotrope of carbon is","a":"Graphite","b":"Diamond","c":"Charcoal","d":"Coke","correct":"B"},{"q":"Which of the following salts is deliquescent?","a":"Na₂CO₃·10H₂O","b":"CaCl₂","c":"CuSO₄·5H₂O","d":"NaCl","correct":"B"},{"q":"The catalyst used in the contact process is","a":"Vanadium(V) oxide","b":"Iron","c":"Platinum","d":"Nickel","correct":"A"},{"q":"Synthetic petrol can be produced from","a":"Coal and hydrogen","b":"Limestone","c":"Sea water","d":"Sulphur","correct":"A"},{"q":"A basic salt contains","a":"Replaceable hydrogen ions","b":"Hydroxide ions","c":"Ammonium ions","d":"Complex ions only","correct":"B"},{"q":"The fraction of petroleum with the highest boiling point is","a":"Petrol","b":"Kerosene","c":"Bitumen","d":"Diesel oil","correct":"C"},{"q":"Which gas is used in fire extinguishers?","a":"CO","b":"CO₂","c":"SO₂","d":"NH₃","correct":"B"},{"q":"Fine chemicals are characterized by","a":"Large scale production","b":"High purity and small scale production","c":"Low cost","d":"Being used only as fuels","correct":"B"},{"q":"The IUPAC name of NaHCO₃ is","a":"Sodium trioxocarbonate(IV)","b":"Sodium hydrogen trioxocarbonate(IV)","c":"Sodium tetraoxocarbonate","d":"Sodium bicarbonate","correct":"B"}];
const tabs=['cbt','broadsheet','students','attendance','fees','idcard','report'];document.getElementById('tabs').innerHTML=tabs.map((t,i)=>`<button class="${i==0?'active':''}" onclick="show('${t}')">${t.toUpperCase()}</button>`).join('');function show(t){document.querySelectorAll('.tab').forEach(d=>d.classList.add('hide'));document.getElementById('tab-'+t).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===t));}
const classes=[...new Set(STUDENTS.map(s=>s.class))];['cbtClass','bsClass','atClass','feeClass'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=classes.map(c=>`<option>${c}</option>`).join('');});document.getElementById('rcStudent').innerHTML=STUDENTS.map(s=>`<option value="${s.id}">${s.id} - ${s.name}</option>`).join('');document.getElementById('idStudent').innerHTML=STUDENTS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');document.getElementById('atDate').valueAsDate=new Date();
function renderStudents(){const q=stSearch.value.toLowerCase();const list=STUDENTS.filter(s=>s.name.toLowerCase().includes(q)||s.id.toLowerCase().includes(q));stList.innerHTML='<table><tr><th>ID</th><th>Name</th><th>Class</th></tr>'+list.map(s=>`<tr><td>${s.id}</td><td>${s.name}</td><td>${s.class}</td></tr>`).join('')+'</table>';}renderStudents();
let qs=[],ans=[],pos=0,stu;function startCBT(){const id=cbtId.value.trim().toUpperCase();const cls=cbtClass.value;const sub=cbtSub.value;const s=STUDENTS.find(x=>x.id===id);if(!s)return alert('ID not found');if(s.class!==cls)return alert(`ID belongs to ${s.class}`);stu={...s,sub};const pool=sub==='Physics'?PHYSICS:sub==='Biology'?BIOLOGY:CHEMISTRY;qs=[...pool].sort(()=>0.5-Math.random()).slice(0,20);ans=Array(20).fill(null);pos=0;cbtExam.classList.remove('hide');showQ();}
function showQ(){const q=qs[pos];cbtExam.innerHTML=`<div class="timer">${stu.name} - ${stu.sub}</div><b>Q${pos+1}/20</b><p>${q.q}</p>`+['a','b','c','d'].map(k=>`<label style="display:block;margin:6px 0"><input type=radio name=r ${ans[pos]===k.toUpperCase()?'checked':''} onchange="ans[${pos}]='${k.toUpperCase()}'"> ${k.toUpperCase()}. ${q[k]}</label>`).join('')+`<div style="display:flex;gap:8px"><button class="secondary" onclick="pos>0&&pos--&&showQ()">Prev</button><button onclick="pos<19?(pos++&&showQ()):submit()">${pos<19?'Next':'Submit'}</button></div>`;}
function submit(){let sc=0;qs.forEach((q,i)=>{if(ans[i]===q.correct)sc++});const term=document.getElementById('bsTerm').value;const key=`bs_${stu.class}_${term}_${stu.sub}`;const data=JSON.parse(localStorage.getItem(key)||'{}');if(!data[stu.id])data[stu.id]={};data[stu.id].cbt=sc;localStorage.setItem(key,JSON.stringify(data));cbtExam.innerHTML=`<h3>Submitted</h3><p>Score: <b>${sc}/20</b></p>`;}
function loadBS(){const cls=bsClass.value;const sub=bsSub.value;const term=bsTerm.value;const key=`bs_${cls}_${term}_${sub}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const studs=STUDENTS.filter(s=>s.class===cls);let h='<table><tr><th>ID</th><th>Name</th><th>CA(40)</th><th>CBT(20)</th><th>Paper(40)</th><th>Exam(60)</th><th>Total(100)</th></tr>';studs.forEach(s=>{const d=data[s.id]||{};h+=`<tr><td>${s.id}</td><td style="text-align:left">${s.name}</td><td><input id="ca_${s.id}" value="${d.ca||''}" oninput="calc('${s.id}')" style="width:55px"></td><td id="cbt_${s.id}">${d.cbt||0}</td><td><input id="pa_${s.id}" value="${d.paper||''}" oninput="calc('${s.id}')" style="width:55px"></td><td id="ex_${s.id}">0</td><td id="to_${s.id}"><b>0</b></td></tr>`});bsTable.innerHTML=h+'</table>';studs.forEach(s=>calc(s.id));}
function calc(id){const ca=Number(document.getElementById(`ca_${id}`).value)||0;const cbt=Number(document.getElementById(`cbt_${id}`).innerText)||0;const pa=Number(document.getElementById(`pa_${id}`).value)||0;const ex=cbt+pa;const tot=ca+ex;document.getElementById(`ex_${id}`).innerText=ex;document.getElementById(`to_${id}`).innerHTML=`<b>${tot}</b>`;}
function saveBS(){const cls=bsClass.value;const sub=bsSub.value;const term=bsTerm.value;const key=`bs_${cls}_${term}_${sub}`;const data=JSON.parse(localStorage.getItem(key)||'{}');STUDENTS.filter(s=>s.class===cls).forEach(s=>{if(!data[s.id])data[s.id]={};data[s.id].ca=document.getElementById(`ca_${s.id}`).value;data[s.id].paper=document.getElementById(`pa_${s.id}`).value;data[s.id].cbt=document.getElementById(`cbt_${s.id}`).innerText});localStorage.setItem(key,JSON.stringify(data));alert('Saved');}
function loadAtt(){const cls=atClass.value;const date=atDate.value;const key=`att_${cls}_${date}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const studs=STUDENTS.filter(s=>s.class===cls);let h='<table><tr><th>ID</th><th>Name</th><th>Present</th></tr>';studs.forEach(s=>{h+=`<tr><td>${s.id}</td><td style="text-align:left">${s.name}</td><td><input type="checkbox" id="at_${s.id}" ${data[s.id]?'checked':''}></td></tr>`});atTable.innerHTML=h+'</table>';}
function saveAtt(){const cls=atClass.value;const date=atDate.value;const key=`att_${cls}_${date}`;const data={};STUDENTS.filter(s=>s.class===cls).forEach(s=>{data[s.id]=document.getElementById(`at_${s.id}`).checked});localStorage.setItem(key,JSON.stringify(data));alert('Attendance saved');}
function loadFees(){const cls=feeClass.value;const key=`fees_${cls}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const studs=STUDENTS.filter(s=>s.class===cls);let h='<table><tr><th>ID</th><th>Name</th><th>Paid</th><th>Balance</th></tr>';studs.forEach(s=>{const paid=+data[s.id]||0;const bal=50000-paid;h+=`<tr><td>${s.id}</td><td style="text-align:left">${s.name}</td><td><input id="fee_${s.id}" value="${paid||''}" style="width:80px" onchange="updateFee('${s.id}')"></td><td>${bal}</td></tr>`});feeTable.innerHTML=h+'</table>';}
function updateFee(id){const cls=feeClass.value;const key=`fees_${cls}`;const data=JSON.parse(localStorage.getItem(key)||'{}');data[id]=document.getElementById(`fee_${id}`).value;localStorage.setItem(key,JSON.stringify(data));loadFees();}
function genID(){const id=idStudent.value;const s=STUDENTS.find(x=>x.id===id);idOut.innerHTML=`<div class="idcard"><h3>SEALED NECTAR</h3><div style="margin-top:20px"><b>${s.name}</b><br>ID: ${s.id}<br>Class: ${s.class}</div></div>`;}
