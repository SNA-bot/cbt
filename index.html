<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sealed Nectar Academy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f5f5;color:#333}
header{background:#002366;color:#fff;padding:12px;text-align:center}header h1{font-size:22px;color:#FFA500}header.v{font-size:11px;opacity:.8}
nav{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px;background:#e9ecef}nav button{padding:10px 4px;border:0;background:#fff;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}nav button.active{background:#002366;color:#fff}
nav button.locked{background:#f8f9fa;color:#999;cursor:not-allowed}nav button.locked::after{content:" 🔒"}
.tab{padding:12px}.hide{display:none}.card{background:#fff;border-radius:8px;padding:12px;margin:8px 0;box-shadow:0 1px 3px rgba(0,0,0,.1)}
input,select,textarea{width:100%;padding:8px;margin:4px 0;border:1px solid #ddd;border-radius:6px;font-size:14px}
input:disabled,select:disabled{background:#f5f5;cursor:not-allowed}
button{width:100%;padding:10px;background:#002366;color:#fff;border:0;border-radius:6px;font-weight:600;margin:6px 0;cursor:pointer}
button.secondary{background:#6c757d}button.danger{background:#dc3545}button.success{background:#198754}.row{display:flex;gap:8px}.row>*{flex:1}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}th,td{border:1px solid #ddd;padding:6px;text-align:center}
.error{background:#dc3545;color:#fff;padding:10px;border-radius:6px;margin:8px}
.success{background:#d1e7dd;color:#0f5132;padding:10px;border-radius:6px;margin:8px}
.badge{background:#FFA500;color:#002366;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700}
.timer{background:#e7f3ff;padding:8px;border-radius:6px;text-align:center;font-weight:700;margin:8px 0}
.timer.warn{background:#ffe7e7;color:#c00}
.exam-lock-msg{background:#fff3cd;color:#856404;padding:10px;border-radius:6px;margin:8px 0;border:1px solid #ffeaa7}
.photo-preview{width:80px;height:80px;border-radius:6px;object-fit:cover;border:2px solid #002366;margin:4px 0}
.idcard{width:320px;height:200px;background:linear-gradient(135deg,#002366,#0044aa);color:#fff;border-radius:12px;padding:12px;margin:10px auto;box-shadow:0 4px 8px rgba(0,0,0,.2);position:relative;overflow:hidden}
.idcard::after{content:'SNA';position:absolute;right:-10px;bottom:-20px;font-size:80px;opacity:.1;font-weight:900;color:#FFA500}
.idphoto{width:70px;height:70px;border-radius:8px;border:2px solid #FFA500;object-fit:cover;position:absolute;right:12px;top:50px}
.import-preview{max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:6px;padding:8px;margin:8px 0;font-size:12px;background:#f8f9fa}
@media print{nav,header,#errorBox,.card button{display:none!important}#idOut{margin:0}.idcard{box-shadow:none}}
</style></head><body>
<header><h1>SEALED NECTAR ACADEMY</h1><div class="v">v6.9.5 - BULK UPLOAD <span class="badge">SECURE</span></div></header>
<nav id="tabs"></nav>
<div id="main">
<div id="errorBox"></div>

<div id="tab-cbt" class="tab">
<div class="card"><h3>CBT Login</h3>
<input id="cbtId" placeholder="Student ID e.g. SNA/2038/001" value="SNA/2038/001">
<select id="cbtClass" onchange="updateCbtSubjects()"></select><select id="cbtSub"></select>
<div id="examInfo" style="font-size:12px;color:#666;margin:6px 0"></div>
<button onclick="startCBT()" id="startBtn">Start Exam</button></div>
<div id="cbtExam"></div>
</div>

<div id="tab-broadsheet" class="tab hide">
<div class="card"><h3>Broadsheet</h3><div class="row">
<select id="bsClass" onchange="updateBsSubjects()"></select><select id="bsSub"></select><select id="bsTerm"><option>First Term</option><option>Second Term</option><option>Third Term</option></select>
</div><button onclick="loadBS()">Load</button><button class="secondary" onclick="saveBS()">Save</button></div>
<div id="bsTable" class="card"></div></div>

<div id="tab-questions" class="tab hide">
<div class="card"><h3>Add Questions - Single</h3><select id="qClass" onchange="updateQSubs()"></select><select id="qSub"></select>
<textarea id="qText" placeholder="Question" rows="2"></textarea>
<input id="qA" placeholder="Option A"><input id="qB" placeholder="Option B">
<input id="qC" placeholder="Option C"><input id="qD" placeholder="Option D">
<select id="qAns"><option value="A">Correct: A</option><option value="B">Correct: B</option><option value="C">Correct: C</option><option value="D">Correct: D</option></select>
<button onclick="addQ()">Add Question</button><button class="secondary" onclick="clearQs()">Clear All for Subject</button>
<div id="qCount"></div></div>

<div class="card"><h3>Bulk Upload Questions - CSV</h3>
<p style="font-size:12px;color:#666;margin:6px 0">Format: Question,A,B,C,D,Correct</p>
<div class="row">
<select id="csvClass"></select><select id="csvSub"></select>
</div>
<button class="secondary" onclick="downloadCSVTemplate()">📥 Download CSV Template</button>
<label style="margin-top:8px">Upload CSV File: <input id="csvFile" type="file" accept=".csv" onchange="previewCSV(event)"></label>
<div id="csvPreview" class="import-preview hide"></div>
<button class="success" id="importBtn" onclick="importCSV()" style="display:none">Import Questions</button>
<div id="importStatus"></div>
</div></div>

<div id="tab-settings" class="tab hide">
<div class="card"><h3>Exam Settings</h3>
<label>Duration (seconds): <input id="setDuration" type="number" value="7200"></label>
<label>Max Violations: <input id="setViolations" type="number" value="7"></label>
<label>Admin PIN: <input id="setPin" placeholder="Set PIN to lock admin tabs" type="password"></label>
<button onclick="saveSettings()">Save Settings</button><div id="setStatus"></div></div>
<div class="card"><h3>Reset</h3><button class="secondary" onclick="resetAllData()">⚠️ Reset All Data</button></div></div>

<div id="tab-students" class="tab hide">
<div class="card"><h3>Add New Student</h3>
<input id="newId" placeholder="Student ID e.g. SNA/2040/001">
<input id="newName" placeholder="Full Name">
<select id="newClass"></select>
<label>Passport Photo: <input id="newPhoto" type="file" accept="image/*" onchange="previewPhoto(event)"></label>
<img id="photoPreview" class="photo-preview hide">
<button onclick="addStudent()">Add Student</button>
<div id="addStudentStatus"></div></div>
<div class="card"><h3>All Students <span id="stCount"></span></h3><input id="stSearch" placeholder="Search name or ID" oninput="renderStudents()"></div>
<div id="stList" class="card"></div></div>

<div id="tab-attendance" class="tab hide">
<div class="card"><h3>Attendance</h3><div class="row"><select id="atClass"></select><input id="atDate" type="date"></div>
<button onclick="loadAtt()">Load</button><button class="secondary" onclick="saveAtt()">Save</button></div>
<div id="atTable" class="card"></div></div>

<div id="tab-fees" class="tab hide">
<div class="card"><h3>Fees - ₦50,000 per term</h3><select id="feeClass"></select><button onclick="loadFees()">Load</button></div>
<div id="feeTable" class="card"></div></div>

<div id="tab-idcard" class="tab hide">
<div class="card"><h3>ID Card Generator</h3><select id="idStudent"></select><button onclick="genID()">Generate</button><button class="secondary" onclick="window.print()">Print ID Card</button></div>
<div id="idOut"></div></div>

<div id="tab-report" class="tab hide">
<div class="card"><h3>Report Card - Third Term</h3><select id="rcStudent"></select><button onclick="genReport()">Generate</button></div>
<div id="rcOut" class="card"></div></div>

</div>
<script>
window.onerror=function(m,s,l,c,e){document.getElementById('errorBox').innerHTML=`<div class="error">⚠️ ${m}<br>Line: ${l}</div>`;return true};

const tabs=['cbt','broadsheet','questions','settings','students','attendance','fees','idcard','report'];
const ADMIN_TABS=['broadsheet','questions','settings','attendance','fees','students'];
let examActive=false;
let isAdmin=false;
let csvData=[];

document.getElementById('tabs').innerHTML=tabs.map((t,i)=>`<button class="${i==0?'active':''} ${ADMIN_TABS.includes(t)?'locked':''}" onclick="show('${t}')">${t.toUpperCase()}</button>`).join('');

function show(t){
  if(examActive && t!=='cbt'){
    alert('⚠️ Exam in progress. Submit your current exam before switching tabs.');
    return;
  }
  if(ADMIN_TABS.includes(t) &&!isAdmin){
    const pin=getSettings().pin;
    if(pin){
      const entered=prompt('🔒 Enter Admin PIN to access '+t.toUpperCase());
      if(entered!==pin){
        alert('❌ Incorrect PIN');
        return;
      }
      isAdmin=true;
      document.querySelectorAll('nav button.locked').forEach(b=>b.classList.remove('locked'));
    }
  }
  document.querySelectorAll('.tab').forEach(d=>d.classList.add('hide'));
  document.getElementById('tab-'+t).classList.remove('hide');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(t)));
  if(t==='students') renderStudents();
  if(t==='attendance') loadAtt();
  if(t==='fees') loadFees();
  if(t==='idcard') loadIdStudents();
  if(t==='report') loadReportStudents();
  if(t==='questions') updateCSVSubs();
}
