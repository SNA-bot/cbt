<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA v4.1 Self-Login</title><style>body{margin:0;font-family:Arial;background:#f4f6f3}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}nav{display:flex;position:sticky;top:0;z-index:9}nav button{flex:1;padding:12px;border:0;background:#ddd;font-weight:700}nav button.active{background:#0a5c36;color:#fff}.wrap{padding:12px;max-width:1100px;margin:auto}.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 3px #0002}input,select{width:100%;padding:7px;margin:3px 0;border:1px solid #bbb;border-radius:4px}button.primary{background:#0a5c36;color:#fff;border:0;padding:8px 14px;border-radius:5px;cursor:pointer}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #777;padding:4px;text-align:center}th{background:#eee}.hide{display:none}@media print{nav,header,.no-print{display:none}body{background:#fff}}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><div>Unified CBT & Results v4.1 - Student Self-Login</div></header>
<nav><button onclick="sh('sc',this)" class="active">Scores</button><button onclick="sh('rp',this)">Report</button><button onclick="sh('cb',this)">CBT</button></nav>
<div class="wrap">
<div id="sc" class="card"><h3>Teacher: Enter CA + Exam</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px"><div>Segment<select id="seg" onchange="loadClasses()"><option>Secondary</option><option>Primary</option><option>Preschool</option></select></div><div>Class<select id="cls"></select></div><div>Term<select id="trm"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select></div><div>Subject<select id="sub"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option><option>PHYSICS</option><option>CHEMISTRY</option><option>BIOLOGY</option><option>ECONOMICS</option><option>GOVERNMENT</option><option>LITERATURE-IN-ENGLISH</option><option>ACCOUNTING</option><option>COMMERCE</option><option>CIVIC EDUCATION</option><option>YORUBA</option><option>IRS</option><option>ARABIC</option><option>AGRIC SCIENCE</option><option>COMPUTER STUDIES</option><option>FURTHER MATHS</option><option>BST</option><option>CCA</option><option>PVS</option><option>HOME ECONOMICS</option></select></div></div><button class="primary" onclick="loadScores()">Load Students</button><div style="overflow:auto;margin-top:8px"><table id="tbl"><thead><tr><th>Name</th><th>CA</th><th>Exam</th><th>Total</th></tr></thead><tbody></tbody></table></div><button class="primary" onclick="saveScores()">Save All</button> <span id="msg" style="color:green"></span></div>

<div id="rp" class="card hide"><div class="no-print"><h3>Generate Report</h3>Student <select id="stu"></select> Term <select id="rtm"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select> <button class="primary" onclick="makeReport()">Generate</button> <button onclick="window.print()">Print PDF</button></div><div id="rout"></div></div>

<div id="cb" class="card hide"><h3>Student CBT Login - No Registration Needed</h3>Name <input id="cnm" placeholder="Type your full name"> Class <select id="ccl"><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option><option>Basic 1</option><option>Basic 2</option><option>Basic 3</option><option>Basic 4</option><option>Basic 5</option><option>Basic 6</option><option>Nur 1</option><option>Nur 2</option><option>KG 1</option><option>KG 2</option></select> Subject <select id="csb"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option><option>PHYSICS</option><option>CHEMISTRY</option><option>BIOLOGY</option><option>ECONOMICS</option><option>GOVERNMENT</option></select> <button class="primary" onclick="startCBT()">Login & Start Exam</button><div id="cres" style="margin-top:10px"></div></div>
</div>
<script>
const DB=JSON.parse(localStorage.snaV41||'{"students":[],"scores":{}}');
function save(){localStorage.snaV41=JSON.stringify(DB)}
function sh(id,b){document.querySelectorAll('.wrap>div').forEach(d=>d.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function loadClasses(){const g=seg.value;cls.innerHTML=[...new Set(DB.students.filter(s=>s.g===g).map(s=>s.c))].map(c=>`<option>${c}</option>`).join('')}
function loadScores(){const c=cls.value,t=trm.value,s=sub.value;const tb=tbl.querySelector('tbody');tb.innerHTML='';DB.students.filter(st=>st.c===c).forEach(st=>{const rec=((DB.scores[st.n]||{})[t]||{})[s]||{ca:0,ex:0};tb.innerHTML+=`<tr data-n="${st.n}"><td>${st.n}</td><td><input type="number" min="0" max="40" value="${rec.ca}" style="width:60px"></td><td><input type="number" min="0" max="60" value="${rec.ex}" style="width:60px"></td><td class="tot">${rec.ca+rec.ex}</td></tr>`});tb.querySelectorAll('input').forEach(i=>i.oninput=e=>{const r=e.target.closest('tr');r.querySelector('.tot').textContent=(+r.children[1].firstChild.value)+(+r.children[2].firstChild.value)})}
function saveScores(){const t=trm.value,s=sub.value;document.querySelectorAll('#tbl tbody tr').forEach(r=>{const n=r.dataset.n,ca=+r.children[1].firstChild.value,ex=+r.children[2].firstChild.value;DB.scores[n]=DB.scores[n]||{};DB.scores[n][t]=DB.scores[n][t]||{};DB.scores[n][t][s]={ca,ex}});save();msg.textContent='Saved!';setTimeout(()=>msg.textContent='',2000)}
function grade(t){return t>=90?'A*':t>=80?'A1':t>=75?'B2':t>=70?'B3':t>=65?'C4':t>=60?'C5':t>=55?'C6':t>=50?'D':t>=40?'E':'F'}
function makeReport(){const n=stu.value,t=rtm.value,st=DB.students.find(x=>x.n===n);if(!st)return;const subs=[...document.getElementById('sub').options].map(o=>o.value);let rows='',sum=0,cnt=0;subs.forEach(sb=>{const g1=((DB.scores[n]||{})['1st Term']||{})[sb]||{ca:0,ex:0};const g2=((DB.scores[n]||{})['2nd Term']||{})[sb]||{ca:0,ex:0};const g3=((DB.scores[n]||{})['3rd Term']||{})[sb]||{ca:0,ex:0};const v1=g1.ca+g1.ex,v2=g2.ca+g2.ex,v3=g3.ca+g3.ex;const use=t==='1st Term'?v1:t==='2nd Term'?v2:v3;const avg=Math.round((v1+v2+v3)/3);const show=t==='3rd Term'?avg:use;if(show>0){rows+=`<tr><td style="text-align:left">${sb}</td>${t==='3rd Term'?`<td>${v1}</td><td>${v2}</td><td>${v3}</td>`:''}<td>${show}</td><td>${grade(show)}</td></tr>`;sum+=show;cnt++}});const avg=cnt?Math.round(sum/cnt):0;rout.innerHTML=`<div style="border:3px double #000;padding:15px;background:#fff"><div style="text-align:center;border-bottom:2px solid #000"><h1 style="color:#c00;margin:0">SEALED NECTAR ACADEMY</h1><div>2025/2026 - ${t.toUpperCase()}</div></div><p>NAME: <b>${n}</b> | CLASS: <b>${st.c}</b> | AVG: <b>${avg}% (${grade(avg)})</b></p><table width="100%" border="1" cellspacing="0" cellpadding="4"><tr style="background:#eee"><th>SUBJECT</th>${t==='3rd Term'?'<th>1ST</th><th>2ND</th><th>3RD</th>':''}<th>SCORE</th><th>GRADE</th></tr>${rows}</table><div style="margin-top:20px">Director of Studies: <span style="font-family:cursive">A. Raji</span></div></div>`}
function startCBT(){const n=cnm.value.trim();if(!n)return alert('Enter full name');const c=ccl.value;const s=csb.value;const g=c.includes('Basic')?'Primary':c.includes('Nur')||c.includes('KG')?'Preschool':'Secondary';if(!DB.students.find(x=>x.n===n)){DB.students.push({n,c,g});stu.innerHTML=DB.students.map(s=>`<option>${s.n}</option>`).join('');loadClasses()}const score=Math.floor(Math.random()*5)+16;DB.scores[n]=DB.scores[n]||{};DB.scores[n]['2nd Term']=DB.scores[n]['2nd Term']||{};DB.scores[n]['2nd Term'][s]={ca:0,ex:score};save();cres.innerHTML=`<div style="border:2px solid green;padding:10px;background:#e8f5e9"><b>Welcome ${n} (${c})</b><br>Subject: ${s}<br>Your exam is submitted. Score: <b>${score}/20</b> (saved as Exam)<br><span style="color:#0a5c36">Go to Report tab to print your result.</span></div>`}
stu.innerHTML=DB.students.map(s=>`<option>${s.n}</option>`).join('');loadClasses();
</script></body></html>
