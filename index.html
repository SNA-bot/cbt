function startCBT(){const id=cbtId.value.trim().toUpperCase();const cls=cbtClass.value;const sub=cbtSub.value;const s=STUDENTS.find(x=>x.id===id);if(!s)return alert('ID not found');if(s.class!==cls)return alert(`ID belongs to ${s.class}`);stu={...s,sub};const pool=getPool(sub);qs=[...pool].sort(()=>0.5-Math.random()).slice(0,Math.min(20,pool.length));ans=Array(qs.length).fill(null);pos=0;violations=0;examActive=true;cbtExam.classList.remove('hide');const settings=getSettings();secLeft=settings.duration;maxViolations=settings.violations;startTimer();showQ();document.addEventListener('visibilitychange',handleVisibility);window.addEventListener('blur',handleVisibility);window.addEventListener('beforeunload',preventExit);}
function startTimer(){clearInterval(timerInt);updateTimerDisplay();timerInt=setInterval(()=>{secLeft--;updateTimerDisplay();if(secLeft<=0){clearInterval(timerInt);alert('Time up! Auto-submitting');submit();}},1000);}
function updateTimerDisplay(){const m=Math.floor(secLeft/60).toString().padStart(2,'0');const s=(secLeft%60).toString().padStart(2,'0');const el=document.getElementById('timerBar');if(el){el.textContent=`${stu.name} | ${stu.sub} | Time Left: ${m}:${s} | Violations: ${violations}/${maxViolations}`;el.classList.toggle('warn',secLeft<120);}}
function handleVisibility(){if(!examActive)return;if(document.hidden){violations++;updateTimerDisplay();if(violations>=maxViolations){alert(`${maxViolations} tab switches detected. Exam submitted.`);submit();}else{alert(`Warning ${violations}/${maxViolations}: Do not leave the exam tab`);}}}
function preventExit(e){if(examActive){e.preventDefault();e.returnValue='';return '';}}
function showQ(){const q=qs[pos];cbtExam.innerHTML=`<div id="timerBar" class="timer"></div><b>Q${pos+1}/${qs.length}</b><p>${q.q}</p>`+['a','b','c','d'].map(k=>`<label style="display:block;margin:6px 0"><input type=radio name=r ${ans[pos]===k.toUpperCase()?'checked':''} onchange="ans[${pos}]='${k.toUpperCase()}'"> ${k.toUpperCase()}. ${q[k]}</label>`).join('')+`<div style="display:flex;gap:8px;margin-top:10px"><button class="secondary" onclick="pos>0&&pos--&&showQ()">Prev</button><button onclick="pos<qs.length-1?(pos++&&showQ()):submit()">${pos<qs.length-1?'Next':'Submit'}</button></div>`;updateTimerDisplay();}
function submit(){if(!examActive)return;examActive=false;clearInterval(timerInt);document.removeEventListener('visibilitychange',handleVisibility);window.removeEventListener('blur',handleVisibility);window.removeEventListener('beforeunload',preventExit);let sc=0;qs.forEach((q,i)=>{if(ans[i]===q.correct)sc++});const term=document.getElementById('bsTerm').value;const key=`bs_${stu.class}_${term}_${stu.sub}`;const data=JSON.parse(localStorage.getItem(key)||'{}');if(!data[stu.id])data[stu.id]={};data[stu.id].cbt=sc;localStorage.setItem(key,JSON.stringify(data));const settings=getSettings();const timeUsed=settings.duration-secLeft;cbtExam.innerHTML=`<h3>Submitted</h3><p>Score: <b>${sc}/${qs.length}</b></p><p>Violations: ${violations}/${maxViolations}</p><p>Saved to Broadsheet</p><p>Time used: ${Math.floor(timeUsed/60)}:${String(timeUsed%60).padStart(2,'0')}</p>`;}
function addQ(){const cls=qClass.value;const sub=qSub.value;const q={q:qText.value.trim(),a:qA.value.trim(),b:qB.value.trim(),c:qC.value.trim(),d:qD.value.trim(),correct:qAns.value};if(!q.q||!q.a||!q.b||!q.c||!q.d)return alert('Fill all fields');const key=`custom_${sub}`;const arr=JSON.parse(localStorage.getItem(key)||'[]');arr.push(q);localStorage.setItem(key,JSON.stringify(arr));qText.value=qA.value=qB.value=qC.value=qD.value='';updateQCount();alert('Added! Now CBT will use your questions.');}
function updateQCount(){const sub=qSub.value;const key=`custom_${sub}`;const arr=JSON.parse(localStorage.getItem(key)||'[]');qCount.innerHTML=`<b>${sub} has ${arr.length} custom questions</b><br>${arr.length>=5?'<span style="color:green">✓ CBT will use your questions</span>':'<span style="color:orange">Add '+ (5-arr.length) +' more to use custom questions</span>'}`;}
function clearQs(){if(confirm('Delete all questions for '+qSub.value+'?')){localStorage.removeItem(`custom_${qSub.value}`);updateQCount();}}
document.addEventListener('copy',e=>{if(examActive){e.preventDefault();alert('Copying is disabled during exam');}});

document.addEventListener('paste',e=>{if(examActive){e.preventDefault();alert('Pasting is disabled during exam');}});
function loadBS(){const cls=bsClass.value;const sub=bsSub.value;const term=bsTerm.value;const key=`bs_${cls}_${term}_${sub}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const studs=STUDENTS.filter(s=>s.class===cls);let h='<table><tr><th>ID</th><th>Name</th><th>CA(40)</th><th>CBT(20)</th><th>Paper(40)</th><th>Exam(60)</th><th>Total(100)</th></tr>';studs.forEach(s=>{const d=data[s.id]||{};h+=`<tr><td>${s.id}</td><td style="text-align:left">${s.name}</td><td><input id="ca_${s.id}" value="${d.ca||''}" oninput="calc('${s.id}')" style="width:55px"></td><td id="cbt_${s.id}">${d.cbt||0}</td><td><input id="pa_${s.id}" value="${d.paper||''}" oninput="calc('${s.id}')" style="width:55px"></td><td id="ex_${s.id}">0</td><td id="to_${s.id}"><b>0</b></td></tr>`});bsTable.innerHTML=h+'</table>';studs.forEach(s=>calc(s.id));}
function calc(id){const ca=Number(document.getElementById(`ca_${id}`).value)||0;const cbt=Number(document.getElementById(`cbt_${id}`).innerText)||0;const pa=Number(document.getElementById(`pa_${id}`).value)||0;const ex=cbt+pa;const tot=ca+ex;document.getElementById(`ex_${id}`).innerText=ex;document.getElementById(`to_${id}`).innerHTML=`<b>${tot}</b>`;}
function saveBS(){const cls=bsClass.value;const sub=bsSub.value;const term=bsTerm.value;const key=`bs_${cls}_${term}_${sub}`;const data=JSON.parse(localStorage.getItem(key)||'{}');STUDENTS.filter(s=>s.class===cls).forEach(s=>{if(!data[s.id])data[s.id]={};data[s.id].ca=document.getElementById(`ca_${s.id}`).value;data[s.id].paper=document.getElementById(`pa_${s.id}`).value;data[s.id].cbt=document.getElementById(`cbt_${s.id}`).innerText});localStorage.setItem(key,JSON.stringify(data));alert('Saved');}
function loadAtt(){const cls=atClass.value;const date=atDate.value;if(!cls||!date)return;const key=`att_${cls}_${date}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const studs=STUDENTS.filter(s=>s.class===cls);let h='<table><tr><th>ID</th><th>Name</th><th>Present</th></tr>';studs.forEach(s=>{h+=`<tr><td>${s.id}</td><td style="text-align:left">${s.name}</td><td><input type="checkbox" id="at_${s.id}" ${data[s.id]?'checked':''}></td></tr>`});atTable.innerHTML=h+'</table>';}
function saveAtt(){const cls=atClass.value;const date=atDate.value;if(!cls||!date)return alert('Select class and date');const key=`att_${cls}_${date}`;const data={};STUDENTS.filter(s=>s.class===cls).forEach(s=>{data[s.id]=document.getElementById(`at_${s.id}`).checked});localStorage.setItem(key,JSON.stringify(data));alert('Attendance saved for '+date);}
function loadFees(){const cls=feeClass.value;if(!cls)return;const key=`fees_${cls}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const studs=STUDENTS.filter(s=>s.class===cls);let h='<table><tr><th>ID</th><th>Name</th><th>Paid (₦)</th><th>Balance (₦)</th></tr>';studs.forEach(s=>{const paid=+data[s.id]||0;const bal=50000-paid;h+=`<tr><td>${s.id}</td><td style="text-align:left">${s.name}</td><td><input id="fee_${s.id}" value="${paid||''}" style="width:80px" onchange="updateFee('${s.id}')"></td><td id="bal_${s.id}">${bal}</td></tr>`});feeTable.innerHTML=h+'</table>';}
function updateFee(id){const cls=feeClass.value;const key=`fees_${cls}`;const data=JSON.parse(localStorage.getItem(key)||'{}');const paid=Number(document.getElementById(`fee_${id}`).value)||0;data[id]=paid;localStorage.setItem(key,JSON.stringify(data));document.getElementById(`bal_${id}`).innerText=50000-paid;}
function genID(){const id=idStudent.value;const s=STUDENTS.find(x=>x.id===id);if(!s)return;idOut.innerHTML=`<div style="width:320px;height:200px;background:linear-gradient(135deg,#002366,#0044aa);color:#fff;border-radius:12px;padding:12px;margin:10px auto;box-shadow:0 4px 8px rgba(0,0,0,.2);position:relative"><h3 style="margin:0;color:#FFA500">SEALED NECTAR ACADEMY</h3><div style="margin-top:20px;font-size:14px;line-height:1.6"><b>${s.name}</b><br>ID: ${s.id}<br>Class: ${s.class}<br>Session: 2024/2025</div><div style="position:absolute;bottom:12px;right:12px;font-size:10px;opacity:0.7">SNA</div></div>`;}
function genReport(){const id=rcStudent.value;const s=STUDENTS.find(x=>x.id===id);if(!s)return;let out=`<h3>THIRD TERM REPORT CARD</h3><p><b>Name:</b> ${s.name}<br><b>ID:</b> ${s.id}<br><b>Class:</b> ${s.class}</p><table><tr><th>Subject</th><th>CA(40)</th><th>CBT(20)</th><th>Paper(40)</th><th>Total</th><th>Grade</th><th>Remark</th></tr>`;let totalMarks=0,subCount=0;SUBJECTS[s.class].forEach(sub=>{const d=JSON.parse(localStorage.getItem(`bs_${s.class}_Third Term_${sub}`)||'{}')[id]||{};const ca=+d.ca||0;const cbt=+d.cbt||0;const pap=+d.paper||0;const tot=ca+cbt+pap;totalMarks+=tot;subCount++;const grade=tot>=75?'A1':tot>=70?'B2':tot>=65?'B3':tot>=60?'C4':tot>=55?'C5':tot>=50?'C6':tot>=45?'D7':tot>=40?'E8':'F9';const remark=tot>=50?'PASS':'FAIL';out+=`<tr><td style="text-align:left">${sub}</td><td>${ca}</td><td>${cbt}</td><td>${pap}</td><td><b>${tot}</b></td><td>${grade}</td><td>${remark}</td></tr>`});const avg=subCount?(totalMarks/subCount).toFixed(1):0;out+=`</table><p style="margin-top:10px"><b>Total: ${totalMarks}</b> | <b>Average: ${avg}%</b></p>`;rcOut.innerHTML=out;}
show('cbt');
</script></body></html>
