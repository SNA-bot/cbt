<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA CBT v5.0</title><style>body{margin:0;font-family:system-ui;background:#f0f2f5}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}h1{margin:0;font-size:20px}.wrap{max-width:900px;margin:auto;padding:12px}.card{background:#fff;padding:14px;margin:10px 0;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1)}label{display:block;font-weight:600;margin:6px 0 3px;font-size:14px}select,input,textarea,button{width:100%;padding:10px;font-size:15px;border:1px solid #bbb;border-radius:8px;box-sizing:border-box}button{background:#0a5c36;color:#fff;font-weight:700;border:0;margin-top:8px;cursor:pointer}button.sec{background:#eee;color:#333}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hide{display:none}.timer{position:sticky;top:0;background:#b00;color:#fff;padding:8px;text-align:center;font-weight:700;border-radius:6px}.warn{background:#ffcc00;color:#000;padding:8px;border-radius:6px;text-align:center;font-weight:700}</style></head><body><header><h1>SEALED NECTAR ACADEMY</h1><div>CBT v5.0 - Secure</div></header><div class="wrap"><div class="card" id="loginCard"><h3>Admin Login</h3><input id="pw" type="password" placeholder="SNA2026"><button onclick="login()">Login</button></div><div id="admin" class="card hide"><h3>Admin Control</h3><div class="row"><div><label>Segment</label><select id="seg"></select></div><div><label>Class</label><select id="cls"></select></div></div><div class="row"><div><label>Term</label><select id="trm"></select></div><div><label>Subject</label><select id="sub"></select></div></div><div class="row"><div><label>Duration (mins 10-180)</label><input id="dur" type="number" value="30" min="10" max="180"></div><div><label>Max Attempts (1-8)</label><input id="att" type="number" value="1" min="1" max="8"></div></div><div class="row"><div><label>Exam PIN (optional)</label><input id="pin" placeholder="e.g. 2026"></div><div><label>&nbsp;</label><button class="sec" onclick="activate()">Activate This Exam</button></div></div><button class="sec" onclick="loadQ()">Load Questions</button> <button class="sec" onclick="resetAtt()">Reset All Attempts</button> <button class="sec" onclick="dl()">Download CSV</button><div id="status"></div><hr><h4>Add/Edit Questions</h4><textarea id="qtxt" placeholder="Question"></textarea><div class="row"><div><input id="a" placeholder="A"></div><div><input id="b" placeholder="B"></div></div><div class="row"><div><input id="c" placeholder="C"></div><div><input id="d" placeholder="D"></div></div><label>Correct (A/B/C/D)</label><input id="cor" maxlength="1"><button onclick="addQ()">Add Question</button><div id="qlist"></div></div><div class="card"><h3>Student Exam</h3><div id="activeInfo" class="warn hide"></div><input id="name" placeholder="Full name"><div class="row"><div><select id="s2"></select></div><div><select id="c2"></select></div></div><div class="row"><div><select id="t2"></select></div><div><select id="b2"></select></div></div><input id="epin" placeholder="Exam PIN (if required)"><button onclick="start()">Start Exam</button><div id="exam"></div></div></div><script>const data={Secondary:["SS1","SS2","SS3"],Junior:["JSS1","JSS2","JSS3"]},terms=["3rd Term"],subs=["PHYSICS","CHEMISTRY","BIOLOGY","MATHEMATICS","ENGLISH","BST"];const fill=(i,a)=>document.getElementById(i).innerHTML=a.map(x=>`<option>${x}</option>`).join('');['seg','s2'].forEach(i=>fill(i,Object.keys(data)));['trm','t2'].forEach(i=>fill(i,terms));['sub','b2'].forEach(i=>fill(i,subs));const upd=()=>{fill('cls',data[seg.value]);fill('c2',data[s2.value])};seg.onchange=upd;s2.onchange=()=>fill('c2',data[s2.value]);upd();const key=()=>`qb_${seg.value}_${cls.value}_${trm.value}_${sub.value}`;function login(){if(pw.value==='SNA2026'){admin.classList.remove('hide');loginCard.classList.add('hide');showActive()}else alert('Wrong')}function activate(){const cfg={seg:seg.value,cls:cls.value,trm:trm.value,sub:sub.value,dur:+dur.value,att:+att.value,pin:pin.value};localStorage.setItem('sna_active',JSON.stringify(cfg));alert('Activated: '+sub.value);showActive()}function showActive(){const a=JSON.parse(localStorage.getItem('sna_active')||'null');if(a){activeInfo.classList.remove('hide');activeInfo.textContent=`ACTIVE EXAM: ${a.cls} ${a.sub} | ${a.dur}mins | Attempts:${a.att}`;}}function loadQ(){const d=JSON.parse(localStorage.getItem(key())||'[]');status.textContent=d.length+' questions';qlist.innerHTML=d.map((x,i)=>`${i+1}. ${x.q} [${x.correct}]`).join('<br>')}function addQ(){const d=JSON.parse(localStorage.getItem(key())||'[]');d.push({q:qtxt.value,a:a.value,b:b.value,c:c.value,d:d.value,correct:cor.value.toUpperCase()});localStorage.setItem(key(),JSON.stringify(d));qtxt.value=a.value=b.value=c.value=d.value=cor.value='';loadQ()}function resetAtt(){Object.keys(localStorage).forEach(k=>{if(k.startsWith('att_'))localStorage.removeItem(k)});alert('Attempts reset')}function dl(){const a=JSON.parse(localStorage.getItem('sna_results')||'[]');if(!a.length)return alert('No results');const c='Name,Class,Subject,Score,Mark,TabSwitches,Date\n'+a.map(r=>`"${r.name}","${r.cls}","${r.subject}",${r.score},${r.mark},${r.switches},"${r.date}"`).join('\n');const b=new Blob([c],{type:'text/csv'});const u=URL.createObjectURL(b);const l=document.createElement('a');l.href=u;l.download='sna_results.csv';l.click()}let qs=[],ans=[],pos=0,tm,tl=0,switches=0,leaveCount=0,activeCfg;function start(){activeCfg=JSON.parse(localStorage.getItem('sna_active')||'null');if(!activeCfg)return alert('No active exam');if(s2.value!==activeCfg.seg||c2.value!==activeCfg.cls||t2.value!==activeCfg.trm||b2.value!==activeCfg.sub)return alert('This subject is not active');if(activeCfg.pin && epin.value!==activeCfg.pin)return alert('Wrong PIN');const k=`qb_${activeCfg.seg}_${activeCfg.cls}_${activeCfg.trm}_${activeCfg.sub}`;qs=JSON.parse(localStorage.getItem(k)||'[]');if(!qs.length)return alert('No questions loaded');const ak='att_'+name.value+'_'+k;if(+(localStorage.getItem(ak)||0)>=activeCfg.att){exam.innerHTML='<b style=color:red>Max attempts reached</b>';return}localStorage.setItem(ak,+(localStorage.getItem(ak)||0)+1);qs=qs.map(x=>({...x})).sort(()=>Math.random()-0.5);ans=Array(qs.length).fill(null);pos=0;tl=activeCfg.dur*60;switches=0;leaveCount=0;document.documentElement.requestFullscreen?.();show();clearInterval(tm);tm=setInterval(()=>{tl--;if(tl<=0){submit()}},1000);document.addEventListener('visibilitychange',handleLeave)}function handleLeave(){if(document.hidden){switches++;leaveCount++;if(leaveCount===1){alert('WARNING: You left the exam. 2nd time = auto submit');}if(leaveCount>=2){submit()}}}function show(){const x=qs[pos];exam.innerHTML=`<div class=timer>Time ${Math.floor(tl/60)}:${('0'+tl%60).slice(-2)} | Left:${leaveCount}/2</div><b>Q${pos+1}/${qs.length}</b><p>${x.q}</p>`+['a','b','c','d'].map(k=>`<label><input type=radio name=r value=${k.toUpperCase()} ${ans[pos]==k.toUpperCase()?'checked':''} onchange="ans[${pos}]=this.value"> ${k.toUpperCase()}. ${x[k]}</label>`).join('<br>')+`<button onclick="pos>0&&pos--&&show()">Prev</button><button onclick="pos<qs.length-1?(pos++&&show()):submit()">${pos<qs.length-1?'Next':'Submit'}</button>`}function submit(){clearInterval(tm);document.removeEventListener('visibilitychange',handleLeave);let c=0;qs.forEach((x,i)=>{if(ans[i]===x.correct)c++});const s=Math.round(c/qs.length*60);let all=JSON.parse(localStorage.getItem('sna_results')||'[]');all.push({name:name.value,cls:activeCfg.cls,subject:activeCfg.sub,score:`${c}/${qs.length}`,mark:s,switches,date:new Date().toLocaleString()});localStorage.setItem('sna_results',JSON.stringify(all));exam.innerHTML=`<h3>Submitted</h3>Score: ${c}/${qs.length} = ${s}/60<br>Tab switches: ${switches}`;try{document.exitFullscreen()}catch(e){}}// Preload your 90 questions
const P=[{"q":"Which of the following is an insulator?","a":"Graphite","b":"Germanium","c":"Polythene","d":"Salt solution","correct":"C"},{"q":"The device used to measure potential difference in a circuit is","a":"Ammeter","b":"Rheostat","c":"Voltmeter","d":"Resistor","correct":"C"},{"q":"According to Ohm’s law, provided temperature is constant","a":"V ∝ 1/I","b":"I ∝ 1/V","c":"V ∝ I","d":"I ∝ R","correct":"C"}];if(!localStorage.getItem('qb_Secondary_SS1_3rd Term_PHYSICS'))localStorage.setItem('qb_Secondary_SS1_3rd Term_PHYSICS',JSON.stringify([...JSON.parse(localStorage.getItem('qb_Secondary_SS1_3rd Term_PHYSICS')||'[]'),...P]));showActive();</script></body></html>
