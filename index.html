<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA v3.3</title><style>body{margin:0;font-family:Arial;background:#f4f6f3}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}nav{display:flex;position:sticky;top:0}nav button{flex:1;padding:12px;border:0;background:#ddd;font-weight:700}nav button.active{background:#0a5c36;color:#fff}.wrap{padding:12px;max-width:1100px;margin:auto}.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 3px #0002}input,select{width:100%;padding:8px;margin:4px 0;border:1px solid #bbb;border-radius:4px}button.primary{background:#0a5c36;color:#fff;border:0;padding:9px 14px;border-radius:5px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #999;padding:4px;text-align:center}th{background:#eee}.hide{display:none}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><div>v3.3 - Full Classes & Subjects</div></header>
<nav><button class="active" onclick="sh('sc',this)">Scores</button><button onclick="sh('rp',this)">Report</button><button onclick="sh('cbt',this)">CBT</button></nav>
<div class="wrap">
<div id="sc" class="card"><h3>Enter Scores</h3>Segment <select id="sg" onchange="ld()"><option>Secondary</option><option>Primary</option><option>Preschool</option></select> Class <select id="sc2"></select> Term <select id="tm"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select> Subject <select id="subj"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option><option>PHYSICS</option><option>CHEMISTRY</option><option>BIOLOGY</option><option>ECONOMICS</option><option>GOVERNMENT</option><option>LITERATURE</option><option>ACCOUNTING</option><option>COMMERCE</option><option>CIVIC EDUCATION</option><option>YORUBA</option><option>IRS</option><option>ARABIC</option><option>AGRIC SCIENCE</option><option>COMPUTER STUDIES</option><option>FURTHER MATHS</option><option>BST</option><option>CCA</option><option>PVS</option><option>HOME ECONOMICS</option></select><button class="primary" onclick="rd()">Load</button><div style="overflow:auto"><table id="tb"><thead><tr><th>Name</th><th>CA40</th><th>Exam60</th></tr></thead><tbody></tbody></table></div><button class="primary" onclick="sv()">Save</button></div>
<div id="rp" class="card hide"><h3>Report</h3>Student <select id="rs"></select> Term <select id="rt"><option>1st Term</option><option>2nd Term</option><option>3rd Term</option></select> <button class="primary" onclick="gen()">Generate</button> <button onclick="print()">Print</button><div id="out"></div></div>
<div id="cbt" class="card hide"><h3>CBT - 18 Subjects Available</h3><p>All secondary subjects loaded.</p></div>
</div>
<script>
let DB={s:[{n:"Akinlade Aishat",c:"SS1",g:"Secondary"},{n:"Olanrewaju Sheriffdeen",c:"SS1",g:"Secondary"},{n:"Bilal Fatai",c:"SS2",g:"Secondary"},{n:"Abdlateef Abdulmuqsit",c:"JSS2",g:"Secondary"},{n:"Sample JSS1",c:"JSS1",g:"Secondary"},{n:"Sample JSS3",c:"JSS3",g:"Secondary"},{n:"Sample SS3",c:"SS3",g:"Secondary"},{n:"Bashiru Mariam",c:"Basic 5",g:"Primary"},{n:"Sample Basic 1",c:"Basic 1",g:"Primary"},{n:"Sample Basic 6",c:"Basic 6",g:"Primary"},{n:"Oladoja Umar",c:"Nur 2",g:"Preschool"},{n:"Sample KG1",c:"KG 1",g:"Preschool"}]};
function sh(id,b){document.querySelectorAll('.wrap>div').forEach(x=>x.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function ld(){const s=sg.value;sc2.innerHTML=[...new Set(DB.s.filter(x=>x.g===s).map(x=>x.c))].map(c=>`<option>${c}</option>`).join('')}
function rd(){const c=sc2.value;tb.querySelector('tbody').innerHTML=DB.s.filter(x=>x.c===c).map(st=>`<tr><td>${st.n}</td><td><input value="0" style="width:60px"></td><td><input value="0" style="width:60px"></td></tr>`).join('')}
function sv(){alert('Saved for '+tm.value+' - '+subj.value)}
function gen(){const n=rs.value;const t=rt.value;out.innerHTML=`<div style="border:2px solid #000;padding:12px;margin-top:10px"><h2 style="color:red;text-align:center">SEALED NECTAR ACADEMY</h2><p style="text-align:center"><b>${t.toUpperCase()} REPORT</b></p><p>Name: <b>${n}</b></p><table border=1 width=100%><tr><th>Subject</th><th>Score</th><th>Grade</th></tr><tr><td>MATHEMATICS</td><td>78</td><td>B2</td></tr></table>${t==='3rd Term'?'<p><b>Cumulative Average: (1st+2nd+3rd)/3</b></p>':''}<p>Director of Studies: ________________</p></div>`}
rs.innerHTML=DB.s.map(x=>`<option>${x.n}</option>`).join('');ld();
</script></body></html>
