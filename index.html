<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA v3.2</title><style>body{margin:0;font-family:Arial;background:#f4f6f3}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}nav{display:flex;position:sticky;top:0;z-index:5}nav button{flex:1;padding:12px;border:0;background:#ddd;font-weight:700}nav button.active{background:#0a5c36;color:#fff}.wrap{padding:12px;max-width:1100px;margin:auto}.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 3px #0002}input,select{width:100%;padding:8px;margin:4px 0;border:1px solid #bbb;border-radius:4px}button.primary{background:#0a5c36;color:#fff;border:0;padding:9px 14px;border-radius:5px;cursor:pointer}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #999;padding:4px;text-align:center}th{background:#eee}.hide{display:none}@media print{nav,header,.no-print{display:none}body{background:#fff}}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><div>CBT + Results Unified System v3.2 (3-Term Cumulative)</div></header>
<nav><button class="active" onclick="sh('cbt',this)">CBT</button><button onclick="sh('sc',this)">Scores</button><button onclick="sh('rp',this)">Report</button><button onclick="sh('tr',this)">Teacher</button></nav>
<div class="wrap">
<div id="cbt" class="card"><h3>Secondary CBT (20 marks)</h3><input id="nm" placeholder="Student Name"><select id="cl"><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option></select><select id="sb"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option><option>PHYSICS</option><option>CHEMISTRY</option><option>BIOLOGY</option><option>ECONOMICS</option><option>GOVERNMENT</option><option>LITERATURE</option><option>ACCOUNTING</option><option>COMMERCE</option><option>CIVIC EDUCATION</option><option>YORUBA</option><option>IRS</option><option>ARABIC</option><option>AGRIC SCIENCE</option><option>COMPUTER STUDIES</option><option>FURTHER MATHS</option></select><button class="primary" onclick="cb.classList.toggle('hide')">Start CBT</button><div id="cb" class="hide"><p>Demo: 5 questions (20 marks)</p><button class="primary" onclick="saveCBT()">Save Score 16/20</button></div></div>

<div id="sc" class="card hide"><h3>Enter Scores (CA 40 + Exam 60)</h3>Segment <select id="sg" onchange="ld()"><option>Secondary</option><option>Primary</option><option>Preschool</option></select> Class <select id="sc2" onchange="rd()"></select> Term <select id="tm" onchange="rd()"><option>1st Term</option><option>2nd Term</option><option selected>3rd Term</option></select> Subject <select id="subj" onchange="rd()"><option>MATHEMATICS</option><option>ENGLISH LANGUAGE</option><option>BASIC SCIENCE</option></select><div style="overflow:auto;margin-top:8px"><table id="tb"><thead></thead><tbody></tbody></table></div><button class="primary" onclick="sv()">Save Scores</button> <button onclick="csv()">Export CSV</button></div>

<div id="rp" class="card hide"><div class="no-print">Student <select id="rs"></select> <button class="primary" onclick="genRpt()">Generate 3rd Term Report (with Cumulative)</button> <button onclick="print()">Print</button></div><div id="rout" style="margin-top:12px"></div></div>

<div id="tr" class="card hide"><h3>Teacher</h3><input type="password" id="pw" placeholder="admin123"><button class="primary" onclick="if(pw.value==='admin123'){alert('Access granted')}">Login</button></div>
</div>
<script>
let DB=JSON.parse(localStorage.sna32||'{}');
if(!DB.s)DB.s=[{n:"Akinlade Aishat",c:"SS1",g:"Secondary"},{n:"Olanrewaju Sheriffdeen",c:"SS1",g:"Secondary"},{n:"Bilal Fatai",c:"SS2",g:"Secondary"},{n:"Abdlateef Abdulmuqsit",c:"JSS2",g:"Secondary"},{n:"Bashiru Mariam",c:"Basic 5",g:"Primary"},{n:"Oladoja Umar",c:"Nur 2",g:"Preschool"}];
if(!DB.m)DB.m={}; // structure: DB.m[name][term][subject]={ca,exam}
function save(){localStorage.sna32=JSON.stringify(DB)}
function sh(id,b){document.querySelectorAll('.wrap>div').forEach(x=>x.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function ld(){const s=sg.value;const cls=[...new Set(DB.s.filter(x=>x.g===s).map(x=>x.c))];sc2.innerHTML=cls.map(x=>`<option>${x}</option>`).join('');rd()}
function rd(){const c=sc2.value;const t=tm.value;const sub=subj.value;const sec=sg.value==='Secondary';tb.querySelector('thead').innerHTML='<tr><th>Name</th><th>CA(40)</th><th>Exam(60)</th><th>Total</th></tr>';const body=tb.querySelector('tbody');body.innerHTML='';DB.s.filter(x=>x.c===c).forEach(st=>{const rec=(((DB.m[st.n]||{})[t]||{})[sub])||{ca:0,ex:0};const tot=rec.ca+rec.ex;body.innerHTML+=`<tr data-n="${st.n}"><td>${st.n}</td><td><input type="number" max="40" value="${rec.ca}" style="width:70px"></td><td><input type="number" max="60" value="${rec.ex}" style="width:70px"></td><td>${tot}</td></tr>`})}
function sv(){const t=tm.value;const sub=subj.value;document.querySelectorAll('#tb tbody tr').forEach(tr=>{const n=tr.dataset.n;const i=[...tr.querySelectorAll('input')];DB.m[n]=DB.m[n]||{};DB.m[n][t]=DB.m[n][t]||{};DB.m[n][t][sub]={ca:+i[0].value,ex:+i[1].value}});save();alert('Saved for '+t)}
function csv(){let o='Name,CA,Exam,Total\n';document.querySelectorAll('#tb tbody tr').forEach(r=>{const inp=[...r.querySelectorAll('input')];o+=r.children[0].textContent+','+inp[0].value+','+inp[1].value+','+r.children[3].textContent+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([o]));a.download='Scores-'+tm.value+'.csv';a.click()}
function saveCBT(){const n=nm.value||'Student';const t='2nd Term';const sub=sb.value;DB.m[n]=DB.m[n]||{};DB.m[n][t]=DB.m[n][t]||{};DB.m[n][t][sub]={ca:0,ex:16};save();alert('CBT 16 saved as Exam for '+n)}
function grade(t){return t>=90?'A*':t>=80?'A1':t>=75?'B2':t>=70?'B3':t>=65?'C4':t>=60?'C5':t>=55?'C6':t>=50?'D':t>=40?'E':'F'}
function genRpt(){const n=rs.value;const st=DB.s.find(x=>x.n===n);const subs=['MATHEMATICS','ENGLISH LANGUAGE','BASIC SCIENCE'];let rows='';let sum1=0,sum2=0,sum3=0;subs.forEach(s=>{const t1=(((DB.m[n]||{})['1st Term']||{})[s])||{ca:0,ex:0};const t2=(((DB.m[n]||{})['2nd Term']||{})[s])||{ca:0,ex:0};const t3=(((DB.m[n]||{})['3rd Term']||{})[s])||{ca:0,ex:0};const v1=t1.ca+t1.ex, v2=t2.ca+t2.ex, v3=t3.ca+t3.ex;sum1+=v1;sum2+=v2;sum3+=v3;const avg=Math.round((v1+v2+v3)/3);rows+=`<tr><td>${s}</td><td>${v1}</td><td>${v2}</td><td>${v3}</td><td>${avg}</td><td>${grade(avg)}</td></tr>`});const avgTotal=Math.round((sum1+sum2+sum3)/(subs.length*3));rout.innerHTML=`<div style="border:2px solid #000;padding:12px;background:#fff"><h2 style="color:#d00;text-align:center;margin:0">SEALED NECTAR ACADEMY</h2><p style="text-align:center;font-size:12px">5 Gemtade Akanji St, Ota<br><b>THIRD TERM REPORT - CUMULATIVE</b></p><table border=1 width=100%><tr><td>NAME</td><td colspan=3><b>${n}</b></td><td>CLASS</td><td>${st.c}</td></tr><tr><td>SESSION</td><td>2025/2026</td><td>TERM</td><td>3rd</td><td>AVERAGE</td><td>${avgTotal}%</td></tr></table><br><table border=1 width=100%><tr><th>SUBJECT</th><th>1ST</th><th>2ND</th><th>3RD</th><th>AVG</th><th>GRADE</th></tr>${rows}</table><p><b>Session Average: ${avgTotal}% - Grade: ${grade(avgTotal)}</b></p><p>Class Teacher: ______________<br><br>Director of Studies: ______________<br><small>Promoted to: ______________</small></p><p style="font-size:10px;text-align:center">IF YOU ARE PIOUS ALLAH SHALL CROWN YOUR EFFORTS</p></div>`}
rs.innerHTML=DB.s.map(x=>`<option>${x.n}</option>`).join('');ld();
</script></body></html>
