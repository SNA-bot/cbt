<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sealed Nectar Academy CBT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,Arial}
body{background:#667eea;min-height:100vh;padding:10px}
.box{max-width:900px;margin:auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.head{background:#1e3a8a;color:#fff;padding:18px;text-align:center}
.nav{display:flex;background:#f1f5f9}
.nav button{flex:1;padding:14px;border:0;background:0;font-weight:600}
.nav button.on{color:#1e3a8a;border-bottom:3px solid #1e3a8a;background:#fff}
.page{padding:20px;display:none}.page.on{display:block}
input,select,textarea,button{width:100%;padding:12px;margin:8px 0;border:1px solid #cbd5e1;border-radius:8px;font-size:15px}
button.btn{background:#1e3a8a;color:#fff;border:0;font-weight:600}
button.btn2{background:#059669;color:#fff;border:0;font-weight:600}
.qcard{background:#f8fafc;padding:15px;border-radius:8px;margin:10px 0}
.opt{padding:10px;margin:6px 0;background:#fff;border:1px solid #cbd5e1;border-radius:6px}
.opt.sel{background:#dbeafe;border-color:#1e3a8a}
.timer{background:#fef3c7;padding:10px;text-align:center;font-weight:700;border-radius:6px;margin-bottom:10px}
.small{font-size:12px;color:#64748b}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="box">
<div class="head"><h1>Sealed Nectar Academy CBT Portal</h1></div>
<div class="nav">
<button class="on" onclick="sw('s',this)">Student</button>
<button onclick="sw('t',this)">Teacher</button>
<button onclick="sw('q',this)">Questions</button>
</div>

<div id="s" class="page on">
<h3>Student</h3>
<input id="sname" placeholder="Full Name">
<select id="sclass"><option value="">Class</option><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option></select>
<select id="ssub"><option value="">Subject</option></select>
<div id="attemptInfo" class="small"></div>
<button class="btn" onclick="startTest()">Start Exam</button>
<div id="examBox" style="display:none"><div class="timer" id="timer"></div><div id="qArea"></div><button class="btn2" onclick="submitTest()">Submit</button></div>
<div id="resultBox" style="display:none"></div>
</div>

<div id="t" class="page">
<div id="tlogin"><h3>Teacher Login</h3><input id="tpass" type="password" placeholder="Password"><button class="btn" onclick="tLogin()">Enter</button></div>
<div id="tdash" style="display:none">
<h3>Settings</h3>
<div class="grid">
<div><label>Exam Time</label><select id="setTime"><option value="30">30 minutes</option><option value="45">45 minutes</option><option value="60">1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option><option value="150">2.5 hours</option><option value="180">3 hours</option></select></div>
<div><label>Attempts</label><select id="setAtt"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option></select></div>
</div>
<button class="btn" onclick="saveSet()">Save Settings</button>
<h3 style="margin-top:20px">Add Question</h3>
<select id="qsub"><option value="">Subject</option></select>
<select id="qclass"><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option></select>
<textarea id="qtxt" placeholder="Question" rows="2"></textarea>
<input id="qa" placeholder="A"><input id="qb" placeholder="B"><input id="qc" placeholder="C"><input id="qd" placeholder="D">
<select id="qans"><option value="">Correct</option><option>A</option><option>B</option><option>C</option><option>D</option></select>
<button class="btn2" onclick="addQ()">Save Question</button>
<h3 style="margin-top:20px">Backup</h3>
<button class="btn" onclick="exportData()">Export (for 30 students)</button>
<input type="file" id="impFile" accept=".json" onchange="importData(event)">
</div>
</div>

<div id="q" class="page"><h3>Question Bank</h3><select id="fsub" onchange="showQs()"><option value="">All</option></select><select id="fclass" onchange="showQs()"><option value="">All</option><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option></select><div id="qlist"></div></div>
</div>
<script>
const PASS='sna2024';
let qs=JSON.parse(localStorage.getItem('sna_questions')||'[]');
let settings=JSON.parse(localStorage.getItem('sna_settings')||'{"time":30,"attempts":1}');
let attempts=JSON.parse(localStorage.getItem('sna_attempts')||'{}');
let curTest=null,timer=null,timeLeft=0;
const subjects=['Mathematics','English','Basic Science','Social Studies','CRS','IRS','Computer','Agric','Business','Civic','Physics','Chemistry','Biology','Economics','Government','Literature'];
function init(){['ssub','qsub','fsub'].forEach(id=>{const el=document.getElementById(id);subjects.forEach(s=>el.innerHTML+=`<option>${s}</option>`)});document.getElementById('setTime').value=settings.time;document.getElementById('setAtt').value=settings.attempts;showQs();}
function sw(id,b){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById(id).classList.add('on');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function tLogin(){if(document.getElementById('tpass').value===PASS){document.getElementById('tlogin').style.display='none';document.getElementById('tdash').style.display='block'}else alert('Wrong')}
function saveSet(){settings.time=+document.getElementById('setTime').value;settings.attempts=+document.getElementById('setAtt').value;localStorage.setItem('sna_settings',JSON.stringify(settings));alert('Saved: '+settings.time+' mins, '+settings.attempts+' attempts')}
function addQ(){const d={sub:qsub.value,cls:qclass.value,txt:qtxt.value.trim(),a:qa.value.trim(),b:qb.value.trim(),c:qc.value.trim(),d:qd.value.trim(),ans:qans.value,id:Date.now()};if(!d.sub||!d.txt||!d.a||!d.b||!d.c||!d.d||!d.ans)return alert('Fill all');qs.push(d);localStorage.setItem('sna_questions',JSON.stringify(qs));qtxt.value=qa.value=qb.value=qc.value=qd.value='';alert('Saved');showQs()}
function showQs(){const fs=fsub.value,fc=fclass.value;qlist.innerHTML=qs.filter(q=>!fs||q.sub===fs).filter(q=>!fc||q.cls===fc).map((q,i)=>`<div class="qcard"><b>${i+1}. [${q.sub}-${q.cls}]</b> ${q.txt}<br><small>${q.a}/${q.b}/${q.c}/${q.d} Ans:${q.ans}</small><br><button onclick="qs=qs.filter(x=>x.id!==${q.id});localStorage.setItem('sna_questions',JSON.stringify(qs));showQs()" style="background:#dc2626;color:#fff;border:0;padding:4px 8px;border-radius:4px;margin-top:5px">Del</button></div>`).join('')||'No questions'}
function exportData(){const blob=new Blob([JSON.stringify({questions:qs,settings})],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SNA-CBT.json';a.click()}
function importData(e){const f=e.target.files[0];const r=new FileReader();r.onload=ev=>{const d=JSON.parse(ev.target.result);qs=d.questions||[];settings=d.settings||settings;localStorage.setItem('sna_questions',JSON.stringify(qs));localStorage.setItem('sna_settings',JSON.stringify(settings));alert('Imported');showQs()};r.readAsText(f)}
function updateInfo(){const k=`${sname.value.toLowerCase()}|${sclass.value}|${ssub.value}`;attemptInfo.textContent=k.includes('||')?'':`Used: ${attempts[k]||0}/${settings.attempts}`}
sname.oninput=sclass.onchange=ssub.onchange=updateInfo;
function startTest(){const name=sname.value.trim(),cls=sclass.value,sub=ssub.value;if(!name||!cls||!sub)return alert('Fill');const k=`${name.toLowerCase()}|${cls}|${sub}`;if((attempts[k]||0)>=settings.attempts)return alert('No attempts left');const pool=qs.filter(q=>q.cls===cls&&q.sub===sub);if(!pool.length)return alert('No questions');curTest={name,cls,sub,qs:pool.sort(()=>Math.random()-.5),ans:{}};timeLeft=settings.time*60;examBox.style.display='block';resultBox.style.display='none';qArea.innerHTML=curTest.qs.map((q,i)=>`<div class="qcard"><b>${i+1}. ${q.txt}</b>${['a','b','c','d'].map(o=>`<div class="opt" onclick="curTest.ans[${i}]='${o.toUpperCase()}';this.parentNode.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')">${o.toUpperCase()}. ${q[o]}</div>`).join('')}</div>`).join('');clearInterval(timer);timer=setInterval(()=>{timeLeft--;const m=Math.floor(timeLeft/60),s=timeLeft%60;timerEl.textContent=`${m}:${s.toString().padStart(2,'0')}`;if(timeLeft<=0){clearInterval(timer);submitTest()}},1000);timerEl=document.getElementById('timer')}
function submitTest(){clearInterval(timer);let sc=0;curTest.qs.forEach((q,i)=>{if(curTest.ans[i]===q.ans)sc++});const k=`${curTest.name.toLowerCase()}|${curTest.cls}|${curTest.sub}`;attempts[k]=(attempts[k]||0)+1;localStorage.setItem('sna_attempts',JSON.stringify(attempts));examBox.style.display='none';resultBox.style.display='block';resultBox.innerHTML=`<div class="qcard"><h3>Result</h3><p>${curTest.name} - ${sc}/${curTest.qs.length}</p><p>Attempts: ${attempts[k]}/${settings.attempts}</p><button class="btn" onclick="location.reload()">Done</button></div>`}
init();
</script>
</body>
</html>
