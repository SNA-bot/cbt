<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SNA CBT v4.6</title><style>body{margin:0;font-family:system-ui;background:#f0f2f5}header{background:#0a5c36;color:#fff;padding:16px;text-align:center}h1{margin:0;font-size:20px}.wrap{max-width:800px;margin:auto;padding:12px}.card{background:#fff;padding:14px;margin:10px 0;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.1)}label{display:block;font-weight:600;margin:8px 0 4px;font-size:14px}select,input,textarea,button{width:100%;padding:11px;font-size16px;border:1px solid #bbb;border-radius:8px;box-sizing:border-box}button{background:#0a5c36;color:#fff;font-weight:700;border:0;margin-top:8px;cursor:pointer}button.sec{background:#eee;color:#333}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.ok{color:green;font-weight:700}.bad{color:#b00;font-weight:700}</style></head>
<body><header><h1>SEALED NECTAR ACADEMY</h1><div>v4.6 – Stable Question Bank</div></header>
<div class="wrap">
<div class="card"><h3>1. Admin Login</h3><input id="pw" type="password" placeholder="Password (SNA2026)"><button onclick="if(pw.value==='SNA2026'){admin.style.display='block';pw.disabled=true;this.disabled=true}else alert('Wrong')">Login</button></div>

<div id="admin" class="card" style="display:none"><h3>2. Choose Where to Save</h3>
<div class="row"><div><label>Segment</label><select id="seg"></select></div><div><label>Class</label><select id="cls"></select></div></div>
<div class="row"><div><label>Term</label><select id="trm"></select></div><div><label>Subject</label><select id="sub"></select></div></div>
<div id="where" style="margin:8px 0;font-size:13px;color:#555"></div>
<button class="sec" onclick="load()">Load Bank</button><div id="status" style="margin-top:6px"></div><hr>
<label>Question</label><textarea id="q" rows="2"></textarea>
<div class="row"><div><label>A</label><input id="a"></div><div><label>B</label><input id="b"></div></div>
<div class="row"><div><label>C</label><input id="c"></div><div><label>D</label><input id="d"></div></div>
<label>Correct Answer</label><select id="co"><option>A</option><option>B</option><option>C</option><option>D</option></select>
<button onclick="add()">Add & Save Question</button>
<div id="list" style="margin-top:10px;font-size:14px"></div></div>

<div class="card"><h3>3. Student CBT Test</h3>
<input id="name" placeholder="Student full name">
<div class="row"><div><label>Segment</label><select id="s2"></select></div><div><label>Class</label><select id="c2"></select></div></div>
<div class="row"><div><label>Term</label><select id="t2"></select></div><div><label>Subject</label><select id="b2"></select></div></div>
<button onclick="start()">Start Exam</button><div id="exam" style="margin-top:10px"></div></div>
</div>
<script>
const data={Nursery:["KG1","KG2"],Primary:["PRY1","PRY2","PRY3","PRY4","PRY5","PRY6"],Secondary:["JSS1","JSS2","JSS3","SS1","SS2","SS3"]};
const terms=["1st Term","2nd Term","3rd Term"];
const subs=["MATHEMATICS","ENGLISH LANGUAGE","BASIC SCIENCE","PHYSICS","CHEMISTRY","BIOLOGY","BASIC TECHNOLOGY","AGRICULTURAL SCIENCE","CIVIC EDUCATION","COMPUTER STUDIES","ECONOMICS"];
function fill(sel,arr){document.getElementById(sel).innerHTML=arr.map(x=>`<option>${x}</option>`).join('')}
fill('seg',Object.keys(data));fill('s2',Object.keys(data));fill('trm',terms);fill('t2',terms);fill('sub',subs);fill('b2',subs);
function upd(){fill('cls',data[seg.value]);fill('c2',data[s2.value]);where.textContent='Saving to: '+key();} seg.onchange=upd; s2.onchange=()=>fill('c2',data[s2.value]); upd();
function key(){return `qb_${seg.value}_${cls.value}_${trm.value}_${sub.value}`}
function key2(){return `qb_${s2.value}_${c2.value}_${t2.value}_${b2.value}`}
function load(){const d=JSON.parse(localStorage.getItem(key())||"[]");status.innerHTML=`<span class="ok">${d.length} questions found</span>`;list.innerHTML=d.map((x,i)=>`${i+1}. ${x.q} [${x.correct}]`).join('<br>');where.textContent='Saving to: '+key()}
function add(){if(!q.value.trim())return alert('Enter question');let d=JSON.parse(localStorage.getItem(key())||"[]");d.push({q:q.value,a:a.value,b:b.value,c:c.value,d:d.value,correct:co.value});localStorage.setItem(key(),JSON.stringify(d));q.value=a.value=b.value=c.value=d.value='';load();alert('Saved!')}
let qs=[],ans=[],pos=0;
function start(){qs=JSON.parse(localStorage.getItem(key2())||"[]");if(!qs.length){exam.innerHTML='<span class=bad>No questions yet for '+key2()+'</span>';return}ans=Array(qs.length).fill(null);pos=0;show()}
function show(){const x=qs[pos];exam.innerHTML=`<b>Q${pos+1}/${qs.length}</b><p>${x.q}</p>`+['a','b','c','d'].map(k=>`<label style="display:block;margin:4px 0"><input type="radio" name="r" value="${k.toUpperCase()}" ${ans[pos]===k.toUpperCase()?'checked':''} onchange="ans[${pos}]=this.value"> ${k.toUpperCase()}. ${x[k]}</label>`).join('')+`<div class="row"><button class="sec" onclick="if(pos>0){pos--;show()}">Prev</button><button onclick="if(pos<qs.length-1){pos++;show()}else submit()"> ${pos<qs.length-1?'Next':'Submit'}</button></div>`}
function submit(){let c=0;qs.forEach((x,i)=>{if(ans[i]===x.correct)c++});const score=Math.round(c/qs.length*60);exam.innerHTML=`<span class=ok>Done!</span><p>${name.value||'Student'}: ${c}/${qs.length} correct = <b>${score}/60</b></p><p>Questions loaded from: ${key2()}</p>`}
load();
</script></body></html>
