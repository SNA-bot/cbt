<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SNA Unified v3</title><style>body{margin:0;font-family:Arial;background:#f4f6f3}header{background:#0a5c36;color:#fff;padding:14px;text-align:center}nav{display:flex;position:sticky;top:0}nav button{flex:1;padding:12px;border:0;background:#ddd;font-weight:700}nav button.active{background:#0a5c36;color:#fff}.wrap{padding:12px;max-width:1000px;margin:auto}.card{background:#fff;padding:14px;border-radius:8px;margin-bottom:12px;box-shadow:0 1px 3px #0002}input,select{width:100%;padding:8px;margin:4px 0;border:1px solid #bbb;border-radius:4px}button.primary{background:#0a5c36;color:#fff;border:0;padding:9px 14px;border-radius:5px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #999;padding:4px;text-align:center}th{background:#eee}.hide{display:none}@media print{nav,header,.no-print{display:none}}</style></head><body>
<header><h2>SEALED NECTAR ACADEMY</h2><div>CBT + Results Unified System v3.1</div></header>
<nav><button class="active" onclick="sh('cbt',this)">CBT</button><button onclick="sh('sc',this)">Scores</button><button onclick="sh('rp',this)">Report</button><button onclick="sh('tr',this)">Teacher</button></nav>
<div class="wrap">
<div id="cbt" class="card"><h3>Secondary CBT (20 marks)</h3><input id="nm" placeholder="Student Name"><select id="cl"><option>JSS1</option><option>JSS2</option><option>JSS3</option><option>SS1</option><option>SS2</option><option>SS3</option><option>Basic 1</option><option>Basic 2</option><option>Basic 3</option><option>Basic 4</option><option>Basic 5</option><option>Basic 6</option><option>Nur 1</option><option>Nur 2</option><option>KG 1</option><option>KG 2</option></select><select id="sb"><option>MATHEMATICS</option><option>ENGLISH</option><option>BASIC SCIENCE</option></select><button class="primary" onclick="cb.classList.toggle('hide')">Start Demo</button><div id="cb" class="hide"><p>Demo: 4/5 correct</p><button class="primary" onclick="saveCBT()">Save Score 16/20</button></div></div>

<div id="sc" class="card hide"><h3>Scores & Broadsheet</h3>Segment <select id="sg" onchange="ld()"><option>Secondary</option><option>Primary</option><option>Preschool</option><option>Creche</option></select> Class <select id="sc2" onchange="rd()"></select> Term <select id="tm"><option>1st Term</option><option selected>2nd Term</option><option>3rd Term</option></select><div style="overflow:auto;margin-top:8px"><table id="tb"><thead></thead><tbody></tbody></table></div><button class="primary" onclick="sv()">Save</button> <button onclick="csv()">Export CSV</button> <button onclick="addS()">+ Add Student</button></div>

<div id="rp" class="card hide"><div class="no-print">Student <select id="rs"></select> Term <select><option>1st Term</option><option selected>2nd Term</option><option>3rd Term</option></select> <button class="primary" onclick="rp()">Generate</button> <button onclick="print()">Print</button></div><div id="rout" style="margin-top:12px"></div></div>

<div id="tr" class="card hide"><h3>Teacher Panel</h3><input type="password" id="pw" placeholder="Password: admin123"><button class="primary" onclick="if(pw.value==='admin123'){alert('Welcome! You can now manage all classes.');tr2.classList.remove('hide')}else{alert('Wrong')}">Login</button><div id="tr2" class="hide"><p>Backup: <button onclick="download()">Download All Data</button></p><p><small>6 demo students loaded. Add your real students using "+ Add Student" in Scores tab.</small></p></div></div>
</div>
<script>
let DB=JSON.parse(localStorage.sna||'{}');
if(!DB.s)DB.s=[
{n:"Akinlade Aishat",c:"SS1",g:"Secondary"},{n:"Olanrewaju Sheriffdeen",c:"SS1",g:"Secondary"},
{n:"Bilal Fatai",c:"SS2",g:"Secondary"},{n:"Abdlateef Abdulmuqsit",c:"JSS2",g:"Secondary"},
{n:"Bashiru Mariam",c:"Basic 5",g:"Primary"},{n:"Oladoja Umar",c:"Nur 2",g:"Preschool"},
{n:"Sample JSS1",c:"JSS1",g:"Secondary"},{n:"Sample JSS3",c:"JSS3",g:"Secondary"},
{n:"Sample SS3",c:"SS3",g:"Secondary"},{n:"Sample Basic 1",c:"Basic 1",g:"Primary"},
{n:"Sample Basic 6",c:"Basic 6",g:"Primary"},{n:"Sample KG",c:"KG 2",g:"Preschool"}
];
if(!DB.m)DB.m={};
function sh(id,b){document.querySelectorAll('.wrap>div').forEach(x=>x.classList.add('hide'));document.getElementById(id).classList.remove('hide');document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')}
function ld(){const s=sg.value;const classes=[...new Set(DB.s.filter(x=>x.g===s).map(x=>x.c))];sc2.innerHTML=classes.map(x=>`<option>${x}</option>`).join('');rd()}
function rd(){const s=sg.value;const c=sc2.value;const sec=s==='Secondary';tb.querySelector('thead').innerHTML=sec?'<tr><th>Name</th><th>CA(40)</th><th>CBT(20)</th><th>Paper(40)</th><th>Total</th><th>Grade</th>':'<tr><th>Name</th><th>CA(40)</th><th>Exam(60)</th><th>Total</th><th>Grade</th>';const body=tb.querySelector('tbody');body.innerHTML='';DB.s.filter(x=>x.c===c).forEach(st=>{const m=DB.m[st.n]||{ca:0,cb:0,pa:0};const t=sec?m.ca+m.cb+m.pa:m.ca+m.pa;const g=t>=90?'A*':t>=80?'A1':t>=75?'B2':t>=70?'B3':t>=65?'C4':t>=60?'C5':t>=55?'C6':t>=50?'D':t>=40?'E':'F';body.innerHTML+=`<tr data-n="${st.n}"><td>${st.n}</td><td><input type="number" value="${m.ca}" max="40" style="width:60px"></td>${sec?`<td><input type="number" value="${m.cb}" max="20" style="width:60px"></td>`:''}<td><input type="number" value="${m.pa}" max="${sec?40:60}" style="width:60px"></td><td>${t}</td><td>${g}</td></tr>`})}
function sv(){document.querySelectorAll('#tb tbody tr').forEach(tr=>{const n=tr.dataset.n;const i=[...tr.querySelectorAll('input')];DB.m[n]={ca:+i[0].value,cb:+(i[1]?.value||0),pa:+(i[2]?.value||i[1].value)};});localStorage.sna=JSON.stringify(DB);alert('Scores saved')}
function csv(){let o='Name,CA,CBT,Paper,Total\n';document.querySelectorAll('#tb tbody tr').forEach(r=>{o+=r.children[0].textContent+','+[...r.querySelectorAll('input')].map(i=>i.value).join(',')+','+r.children[4].textContent+'\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([o]));a.download='SNA-Broadsheet-'+sc2.value+'.csv';a.click()}
function saveCBT(){const n=nm.value||'Student';DB.m[n]={ca:0,cb:16,pa:0};localStorage.sna=JSON.stringify(DB);alert('CBT 16/20 saved for '+n)}
function addS(){const n=prompt('Student full name?');if(!n)return;const c=prompt('Class? (e.g., JSS1, Basic 3)');const g=sg.value;DB.s.push({n,c,g});localStorage.sna=JSON.stringify(DB);ld();alert('Added')}
function rp(){const n=rs.value;const st=DB.s.find(x=>x.n===n);const m=DB.m[n]||{ca:28,cb:14,pa:34};const tot=m.ca+m.cb+m.pa;const grd=tot>=90?'A*':tot>=80?'A1':tot>=75?'B2':tot>=70?'B3':'C4';rout.innerHTML=`<div style="border:2px solid #000;padding:12px;background:#fff"><h2 style="color:red;text-align:center;margin:0">SEALED NECTAR ACADEMY</h2><p style="text-align:center;font-size:12px">REPORT SHEET - 2025/2026</p><table border=1 width=100%><tr><td>NAME</td><td colspan=3><b>${n}</b></td><td>CLASS</td><td>${st.c}</td></tr></table><br><table border=1 width=100%><tr><th>SUBJECT</th><th>CA</th><th>EXAM</th><th>TOTAL</th><th>GRADE</th></tr><tr><td>MATHEMATICS</td><td>${m.ca}</td><td>${m.cb+m.pa}</td><td>${tot}</td><td>${grd}</td></tr></table><p>Director of Studies: __________________</p></div>`}
function download(){const a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(DB));a.download='SNA-Backup.json';a.click()}
rs.innerHTML=DB.s.map(x=>`<option>${x.n}</option>`).join('');ld();
</script></body></html>
