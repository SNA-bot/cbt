<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sealed Nectar Academy - CBT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f5f5f5;color:#333}
header{background:#002366;color:#fff;padding:12px;text-align:center}header h1{font-size:22px;color:#FFA500}header.v{font-size:11px;opacity:.8}
.tab{padding:12px}.card{background:#fff;border-radius:8px;padding:12px;margin:8px 0;box-shadow:0 1px 3px rgba(0,0,0,.1)}
input,select{width:100%;padding:8px;margin:4px 0;border:1px solid #ddd;border-radius:6px;font-size:14px}
button{width:100%;padding:10px;background:#002366;color:#fff;border:0;border-radius:6px;font-weight:600;margin:6px 0;cursor:pointer}
button.secondary{background:#6c757d}.timer{background:#e7f3ff;padding:8px;border-radius:6px;text-align:center;font-weight:700;margin:8px 0}
.timer.warn{background:#ffe7e7;color:#c00}
</style></head><body>
<header><h1>SEALED NECTAR ACADEMY</h1><div class="v">v7.0.0 - CBT PORTAL</div></header>
<div class="tab">
<div class="card"><h3>CBT Login</h3>
<input id="cbtId" placeholder="Student ID e.g. SNA/2038/001" value="SNA/2038/001">
<select id="cbtClass"></select><select id="cbtSub"></select>
<div id="examInfo" style="font-size:12px;color:#666;margin:6px 0"></div>
<button onclick="startCBT()">Start Exam</button></div>
<div id="cbtExam"></div>
</div>
<script>
const STUDENTS=[{"id":"SNA/2031/002","name":"Amao Khalid","class":"Primary 3"},{"id":"SNA/2031/006","name":"Ajani Aishat","class":"Primary 3"},{"id":"SNA/2031/007","name":"Abdussalam Aminah","class":"Primary 3"},{"id":"SNA/2031/008","name":"Akinlabi Zainab","class":"Primary 3"},{"id":"SNA/2033/001","name":"Abdlateef Atiyah","class":"Primary 5"},{"id":"SNA/2033/002","name":"AbdulHameed Adam","class":"Primary 5"},{"id":"SNA/2033/003","name":"Mariam Bashiru","class":"Primary 5"},{"id":"SNA/2033/004","name":"Yusuf Mustakim","class":"Primary 5"},{"id":"SNA/2033/005","name":"Murijanat Tairu","class":"Primary 5"},{"id":"SNA/2035/001","name":"Adeleke AbdulHameed Pelumi","class":"JSS 1"},{"id":"SNA/2035/002","name":"Oyem Seyi","class":"JSS 1"},{"id":"SNA/2035/003","name":"Muhammad Ibrahim","class":"JSS 1"},{"id":"SNA/2035/004","name":"Oladoja AbdulRasak","class":"JSS 1"},{"id":"SNA/2035/005","name":"Bello Abdulhafeez","class":"JSS 1"},{"id":"SNA/2035/006","name":"Yusuf Zeenatallahi","class":"JSS 1"},{"id":"SNA/2035/007","name":"Akinlabi Islamiyah","class":"JSS 1"},{"id":"SNA/2035/008","name":"Muftau Islamiyah Nifemi","class":"JSS 1"},{"id":"SNA/2035/009","name":"Olawale Rhodiat Nifemi","class":"JSS 1"},{"id":"SNA/2035/010","name":"Olawale Roqeebah Ayomide","class":"JSS 1"},{"id":"SNA/2035/011","name":"AbdulQadir Maryam","class":"JSS 1"},{"id":"SNA/2035/012","name":"Ogunbiyi Omodesire","class":"JSS 1"},{"id":"SNA/2035/013","name":"Tahiru Khadijah","class":"JSS 1"},{"id":"SNA/2036/001","name":"Abdlateef Abdulmuqsit","class":"JSS 2"},{"id":"SNA/2036/002","name":"Akinlade Awwau Olabisi","class":"JSS 2"},{"id":"SNA/2036/003","name":"Ahmad Faosiyah","class":"JSS 2"},{"id":"SNA/2036/004","name":"Badejo Khadijah","class":"JSS 2"},{"id":"SNA/2036/005","name":"Eleduwe Mahmun","class":"JSS 2"},{"id":"SNA/2037/001","name":"Adeleke Zulikha Adetutu","class":"JSS 3"},{"id":"SNA/2037/002","name":"Abdussalam AbdurRahman","class":"JSS 3"},{"id":"SNA/2037/003","name":"Ahmad Fawaz Adinoyi","class":"JSS 3"},{"id":"SNA/2038/001","name":"Abdlateef AbdulMumin","class":"SSS 1"},{"id":"SNA/2038/002","name":"Olanrewaju Sheriffdeen","class":"SSS 1"},{"id":"SNA/2038/003","name":"Akinlade Aishat Olamide","class":"SSS 1"},{"id":"SNA/2038/004","name":"Muhammad Faatimah Oyindamola","class":"SSS 1"},{"id":"SNA/2038/005","name":"Akinbolu Imaan","class":"SSS 1"},{"id":"SNA/2038/006","name":"Akinsulie Ireoluwa","class":"SSS 1"},{"id":"SNA/2039/001","name":"Onalaja Muhammad Pemisire","class":"SSS 2"},{"id":"SNA/2039/002","name":"Fatai Bilal","class":"SSS 2"}];
const SUBJECTS={"Primary 3":["English Language","Mathematics","Basic Science","Social Studies","Civic Education","Islamic Studies","Yoruba"],"Primary 5":["English Language","Mathematics","Basic Science","Social Studies","Civic Education","Islamic Studies","Yoruba"],"JSS 1":["English Language","Mathematics","Basic Science","Social Studies","Civic Education","Islamic Studies","Business Studies","Agricultural Science"],"JSS 2":["English Language","Mathematics","Basic Science","Social Studies","Civic Education","Islamic Studies","Business Studies","Agricultural Science"],"JSS 3":["English Language","Mathematics","Basic Science","Social Studies","Civic Education","Islamic Studies","Business Studies","Agricultural Science"],"SSS 1":["Physics","Biology","Chemistry","Mathematics","English Language","Civic Education","Islamic Studies","Economics"],"SSS 2":["Physics","Biology","Chemistry","Mathematics","English Language","Civic Education","Islamic Studies","Economics"]};
const PHYSICS=[{"q":"Which is an insulator?","a":"Graphite","b":"Polythene","c":"Salt solution","d":"Copper","correct":"B"},{"q":"Device to measure potential difference?","a":"Ammeter","b":"Voltmeter","c":"Resistor","d":"Rheostat","correct":"B"},{"q":"Ohm's law: V is proportional to?","a":"1/I","b":"I","c":"R","d":"P","correct":"B"},{"q":"3 resistors 2ohm,3ohm,5ohm in series =","a":"10ohm","b":"30/31ohm","c":"1.55ohm","d":"31/30ohm","correct":"A"},{"q":"Electrical energy unit?","a":"Joules","b":"Kilowatt-hour","c":"Watts","d":"Amps","correct":"B"}];
const BIOLOGY=[{"q":"Micro-organisms are?","a":"Visible to eye","b":"Seen with microscope","c":"Non-living","d":"Plants only","correct":"B"},{"q":"Malaria vector?","a":"Housefly","b":"Tsetse fly","c":"Female Anopheles","d":"Aedes","correct":"C"},{"q":"HIV attacks?","a":"RBC","b":"Helper T cells CD4","c":"Platelets","d":"Muscle","correct":"B"},{"q":"Pasteurization preserves?","a":"Meat","b":"Milk","c":"Vegetables","d":"Grains","correct":"B"},{"q":"Cash crops are for?","a":"Home use","b":"Export income","c":"Animal feed","d":"Medicine only","correct":"B"}];
const CHEMISTRY=[{"q":"Acid produces?","a":"OH- ions","b":"H+ ions","c":"NH4+","d":"O2-","correct":"B"},{"q":"Strong acid?","a":"Ethanoic","b":"H2SO4","c":"HNO3","d":"B and C","correct":"D"},{"q":"pH 2 is?","a":"Weak acid","b":"Strong acid","c":"Neutral","d":"Alkaline","correct":"B"},{"q":"Alkali?","a":"Mg(OH)2","b":"NaOH","c":"Cu(OH)2","d":"Fe(OH)3","correct":"B"},{"q":"Diamond is bad conductor because?","a":"Free electrons","b":"No free electrons","c":"Soft","d":"Layered","correct":"B"}];
const DEFAULT_SETTINGS={duration:7200,violations:7,pin:""};
function getSettings(){return JSON.parse(localStorage.getItem('sna_settings')||JSON.stringify(DEFAULT_SETTINGS))}
function updateExamInfo(){const s=getSettings();examInfo.innerHTML=`Duration: ${s.duration/60} mins | Violations: ${s.violations}`}
let qs=[],ans=[],pos=0,stu,timerInt,secLeft,violations=0,examActive=false,maxViolations=7;
function getPool(sub){const key=`custom_${sub}`;const custom=JSON.parse(localStorage.getItem(key)||'[]');if(custom.length>=5)return custom;if(sub==='Physics')return PHYSICS;if(sub==='Biology')return BIOLOGY;if(sub==='Chemistry')return CHEMISTRY;return PHYSICS}
function startCBT(){const id=cbtId.value.trim().toUpperCase();const cls=cbtClass.value;const sub=cbtSub.value;const s=STUDENTS.find(x=>x.id===id);if(!s)return alert('ID not found');if(s.class!==cls)return alert(`ID belongs to ${s.class}`);stu={...s,sub};const pool=getPool(sub);qs=[...pool].sort(()=>0.5-Math.random()).slice(0,Math.min(20,pool.length));ans=Array(qs.length).fill(null);pos=0;violations=0;examActive=true;const settings=getSettings();secLeft=settings.duration;maxViolations=settings.violations;startTimer();showQ();document.addEventListener('visibilitychange',handleVisibility);window.addEventListener('blur',handleVisibility)}
function startTimer(){clearInterval(timerInt);updateTimerDisplay();timerInt=setInterval(()=>{secLeft--;updateTimerDisplay();if(secLeft<=0){clearInterval(timerInt);alert('Time up!');submit()}},1000)}
function updateTimerDisplay(){const m=Math.floor(secLeft/60).toString().padStart(2,'0');const s=(secLeft%60).toString().padStart(2,'0');const el=document.getElementById('timerBar');if(el){el.textContent=`${stu.name} | ${stu.sub} | Time: ${m}:${s} | Violations: ${violations}/${maxViolations}`;el.classList.toggle('warn',secLeft<120)}}
function handleVisibility(){if(!examActive||!document.hidden)return;violations++;updateTimerDisplay();if(violations>=maxViolations){alert(`${maxViolations} violations. Exam submitted.`);submit()}else{alert(`Warning ${violations}/${maxViolations}`)}}
function showQ(){const q=qs[pos];cbtExam.innerHTML=`<div id="timerBar" class="timer"></div><b>Q${pos+1}/${qs.length}</b><p>${q.q}</p>`+['a','b','c','d'].map(k=>`<label style="display:block;margin:6px 0"><input type=radio name=r ${ans[pos]===k.toUpperCase()?'checked':''} onchange="ans[${pos}]='${k.toUpperCase()}'"> ${k.toUpperCase()}. ${q[k]}</label>`).join('')+`<div style="display:flex;gap:8px;margin-top:10px"><button class="secondary" onclick="pos>0&&pos--&&showQ()">Prev</button><button onclick="pos<qs.length-1?(pos++&&showQ()):submit()">${pos<qs.length-1?'Next':'Submit'}</button></div>`;updateTimerDisplay()}
function submit(){if(!examActive)return;examActive=false;clearInterval(timerInt);document.removeEventListener('visibilitychange',handleVisibility);window.removeEventListener('blur',handleVisibility);let sc=0;qs.forEach((q,i)=>{if(ans[i]===q.correct)sc++});cbtExam.innerHTML=`<h3>Submitted</h3><p>Score: <b>${sc}/${qs.length}</b></p><p>Violations: ${violations}/${maxViolations}</p><p>Your result has been saved</p>`}
const classes=Object.keys(SUBJECTS);
document.addEventListener('DOMContentLoaded',function(){
  cbtClass.innerHTML=classes.map(c=>`<option>${c}</option>`).join('');
  cbtClass.onchange=()=>{cbtSub.innerHTML=SUBJECTS[cbtClass.value].map(s=>`<option>${s}</option>`).join('')};
  cbtClass.onchange();updateExamInfo();
});
</script></body></html>
